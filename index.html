<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BF1-TV</title>
  <link href="./assets/vendor/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/vendor/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #E23E3E;
      --bg: #070707;
      --surface: #0a0a0a;
      --text: #FFFFFF;
      --text-secondary: #A0A0A0;
    }

    /* ===== SKELETON SHIMMER ===== */
    @keyframes bf1Shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%);  }
    }
    .bf1-sk-wrap { position: relative !important; }
    .bf1-sk-overlay {
      position: absolute;
      inset: 0;
      background: #141414;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
      transition: opacity 0.4s ease;
      border-radius: inherit;
    }
    .bf1-sk-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(255,255,255,0.07) 50%,
        transparent 70%
      );
      background-size: 200% 100%;
      animation: bf1Shimmer 1.5s ease-in-out infinite;
    }

    /* Spinner vidéo / live */
    @keyframes bf1Spin {
      to { transform: rotate(360deg); }
    }
    .bf1-vid-spin {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.35s ease;
    }
    .bf1-vid-spin-inner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(226,62,62,0.25);
      border-top-color: #E23E3E;
      border-radius: 50%;
      animation: bf1Spin 0.8s linear infinite;
    }

    * { box-sizing: border-box; }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
      margin: 0;
    }

    #app-content {
      padding-bottom: calc(68px + env(safe-area-inset-bottom, 0px));
      padding-top: 0;
    }

    /* ===== TOP HEADER ===== */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 1030;
      background-color: #000000;
      border-bottom: 1px solid #E23E3E;
      /* Hauteur = 56px contenu + barre de statut */
      padding-top: max(env(safe-area-inset-top, 0px), 0px);
      min-height: calc(56px + env(safe-area-inset-top, 0px));
      display: flex;
      align-items: flex-end; /* aligne les icônes en bas du header élargi */
      justify-content: space-between;
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: 10px;
    }

    .app-header .brand {
      font-size: 18px;
      font-weight: bold;
      color: #FFFFFF;
      text-align: center;
      flex: 1;
      letter-spacing: 0.5px;
    }

    .app-header .header-icon {
      color: #E23E3E;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      text-decoration: none;
      display: flex;
      align-items: center;
      width: 40px;
      justify-content: center;
      background: none;
      border: none;
    }

    /* ===== DRAWER MENU ===== */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
    }
    .drawer-overlay.open { display: block; }

    .drawer {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: #0d0d0d;
      border-right: 1.5px solid #E23E3E;
      z-index: 2001;
      transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .drawer.open { left: 0; }

    .drawer-header {
      background: #000;
      border-bottom: 1px solid #E23E3E;
      padding: 20px 16px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drawer-title {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .drawer-title span { color: #E23E3E; }
    .drawer-close {
      background: none;
      border: none;
      color: #E23E3E;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      display: flex;
    }
    .drawer-section-title {
      font-size: 11px;
      font-weight: 600;
      color: #A0A0A0;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 16px 8px;
    }
    .drawer-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
      border-radius: 0;
    }
    .drawer-link:hover, .drawer-link:focus {
      background: rgba(226,62,62,0.1);
      color: #E23E3E;
    }
    .drawer-link i {
      font-size: 20px;
      width: 24px;
      color: #E23E3E;
      text-align: center;
    }
    .drawer-divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 4px 16px;
    }

    /* ===== BOTTOM TAB BAR ===== */
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1040;
      background-color: #000000;
      border-top: 1.5px solid #E23E3E;
      /* Hauteur = 60px + barre de navigation système */
      min-height: calc(60px + env(safe-area-inset-bottom, 0px));
      display: flex;
      align-items: flex-start;
      padding-top: 6px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -4px 15px rgba(226, 62, 62, 0.2);
      overflow: visible;
    }

    .bottom-nav .tabs {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding: 0;
      margin: 0;
      list-style: none;
      overflow: visible;
    }

    .bottom-nav .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      overflow: visible;
    }

    .bottom-nav .tab-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: #A0A0A0;
      text-decoration: none;
      padding: 0;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .bottom-nav .tab-link i {
      font-size: 22px;
      line-height: 1;
    }

    .bottom-nav .tab-link span {
      font-size: 10px;
      font-weight: 500;
      line-height: 1;
    }

    .bottom-nav .tab-link.active {
      color: #E23E3E;
    }

    .bottom-nav .tab-link:hover {
      color: #E23E3E;
    }

    /* ===== SPLASH SCREEN ===== */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000000;
      transition: opacity 0.5s ease;
    }
    #splash-screen.hiding {
      opacity: 0;
      pointer-events: none;
    }
    #splash-logo {
      width: 180px;
      height: 180px;
      border-radius: 20px;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.8);
      animation: splashLogoIn 0.8s ease forwards;
    }
    @keyframes splashLogoIn {
      to { opacity: 1; transform: scale(1); }
    }
    #splash-glow {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,20,60,0.35) 0%, transparent 70%);
      animation: splashGlow 2s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes splashGlow {
      from { opacity: 0.3; transform: scale(0.9); }
      to   { opacity: 0.8; transform: scale(1.15); }
    }
    #splash-tagline {
      margin-top: 40px;
      font-size: 16px;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 1.5px;
      text-align: center;
      text-shadow: 0 0 10px rgba(220,20,60,0.3);
      min-height: 24px;
    }
    #splash-cursor {
      display: inline-block;
      width: 3px;
      height: 18px;
      background: #DC143C;
      margin-left: 3px;
      vertical-align: middle;
      box-shadow: 0 0 6px #DC143C;
      animation: splashBlink 0.7s step-end infinite;
    }
    @keyframes splashBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Page Loader */
    #page-loader {
      z-index: 9999;
      background: #000000;
    }
  </style>
</head>
<body>
  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash-screen">
    <div style="position:relative;display:flex;align-items:center;justify-content:center;">
      <div id="splash-glow"></div>
      <img id="splash-logo" src="./assets/images/logo.png" alt="BF1 TV" />
    </div>
    <p id="splash-tagline"><span id="splash-text"></span><span id="splash-cursor"></span></p>
  </div>

  <div id="app-shell">

    <!-- ===== DRAWER OVERLAY ===== -->
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

    <!-- ===== SIDE DRAWER ===== -->
    <nav class="drawer" id="side-drawer" aria-label="Menu principal">
      <div class="drawer-header">
        <div class="drawer-title">
          <img src="./assets/images/logo.png" alt="BF1 TV" style="height:40px;object-fit:contain;">
        </div>
        <button class="drawer-close" onclick="closeDrawer()" title="Fermer">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="drawer-section-title">Navigation</div>
      <a href="#/home" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-house-door"></i>Accueil</a>
      <a href="#/emissions" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-tv"></i>Émissions</a>
      <a href="#/live" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-broadcast"></i>Direct Live</a>
      <a href="#/reels" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-play-circle"></i>Reels</a>

      <hr class="drawer-divider">
      <div class="drawer-section-title">Actualités &amp; Émissions</div>
      <a href="#/news" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-newspaper"></i>Flash Info</a>
      <a href="#/jtandmag" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-collection-play"></i>JT &amp; Mag</a>
      <a href="#/divertissement" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-emoji-smile"></i>Divertissement</a>
      <a href="#/sports" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-trophy"></i>Sport</a>
      <a href="#/reportages" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-camera-reels"></i>Reportages</a>
      <a href="#/archive" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-archive"></i>Archives</a>
      <a href="#/programs" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-calendar-week"></i>Calendrier</a>

      <hr class="drawer-divider">
      <div class="drawer-section-title">Films &amp; Séries</div>
      <a href="#/movies" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-film"></i>Films</a>

      <hr class="drawer-divider">
      <div class="drawer-section-title">Mon espace</div>
      <a href="#/profile" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-person-circle"></i>Mon compte</a>
      <a href="#/favorites" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-heart"></i>Favoris</a>

      <hr class="drawer-divider">
      <a href="#/about" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-info-circle"></i>À propos</a>
      <a href="#/support" class="drawer-link" onclick="closeDrawer()"><i class="bi bi-question-circle"></i>Support</a>
    </nav>

    <!-- ===== TOP HEADER ===== -->
    <header class="app-header">
      <button class="header-icon" onclick="openDrawer()" title="Menu">
        <i class="bi bi-list"></i>
      </button>
      <div class="brand">BF1 TV</div>
      <div style="display:flex;gap:4px;align-items:center;">
        <a href="#/search" class="header-icon" title="Rechercher">
          <i class="bi bi-search"></i>
        </a>
        <a href="#/notifications" class="header-icon" id="notif-icon" title="Notifications" style="position:relative;">
          <i class="bi bi-bell"></i>
          <span id="notif-badge" style="display:none;position:absolute;top:2px;right:2px;width:8px;height:8px;background:#E23E3E;border-radius:50%;"></span>
        </a>
      </div>
    </header>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main id="app-content">
      <!-- Le contenu sera chargé dynamiquement -->
    </main>

    <!-- ===== BOTTOM TAB BAR ===== -->
    <nav class="bottom-nav">
      <ul class="tabs">
        <li class="tab-item">
          <a class="tab-link active" href="#/home" data-route="#/home" id="tab-home">
            <i class="bi bi-house-fill"></i>
            <span>Accueil</span>
          </a>
        </li>
        <li class="tab-item">
          <a class="tab-link" href="#/emissions" data-route="#/emissions" id="tab-emissions">
            <i class="bi bi-tv"></i>
            <span>Émissions</span>
          </a>
        </li>
        <li class="tab-item">
          <a class="tab-link" href="#/live" data-route="#/live" id="tab-live">
            <i class="bi bi-broadcast"></i>
            <span>Live</span>
          </a>
        </li>
        <li class="tab-item">
          <a class="tab-link" href="#/reels" data-route="#/reels" id="tab-reels">
            <i class="bi bi-play-circle"></i>
            <span>Reels</span>
          </a>
        </li>
        <li class="tab-item">
          <a class="tab-link" href="#/profile" data-route="#/profile" id="tab-profile">
            <i class="bi bi-person-circle"></i>
            <span>Mon compte</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Page Loader -->
  <div id="page-loader" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center d-none"></div>

  <!-- Capacitor runtime (injecté automatiquement sur Android/iOS, ignoré sur web) -->
  <script>
    if (window.Capacitor === undefined) {
      // On web : stub vide pour éviter les erreurs
      window.Capacitor = { isNativePlatform: () => false, getPlatform: () => 'web' };
    }
  </script>
  <script src="./assets/vendor/bootstrap.bundle.min.js"></script>
  <script>
    // Fonctions d'ouverture/fermeture du drawer
    function openDrawer() {
      document.getElementById('side-drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    
    function closeDrawer() {
      document.getElementById('side-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    
    // Fermer avec la touche Escape
    document.addEventListener('keydown', function(e) { 
      if (e.key === 'Escape') closeDrawer(); 
    });
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
