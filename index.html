<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BF1-TV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #E23E3E;
      --bg: #070707;
      --surface: #0a0a0a;
      --text: #FFFFFF;
      --text-secondary: #A0A0A0;
    }

    * { box-sizing: border-box; }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
      margin: 0;
    }

    #app-content {
      padding-bottom: 68px; /* hauteur tab bar */
    }

    /* ===== TOP HEADER ===== */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 1030;
      background-color: #000000;
      border-bottom: 1px solid #E23E3E;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .app-header .brand {
      font-size: 18px;
      font-weight: bold;
      color: #FFFFFF;
      text-align: center;
      flex: 1;
      letter-spacing: 0.5px;
    }

    .app-header .header-icon {
      color: #E23E3E;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      text-decoration: none;
      display: flex;
      align-items: center;
      width: 40px;
      justify-content: center;
    }

    /* ===== DRAWER MENU ===== */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
    }
    .drawer-overlay.open { display: block; }

    .drawer {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: #0d0d0d;
      border-right: 1.5px solid #E23E3E;
      z-index: 2001;
      transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .drawer.open { left: 0; }

    .drawer-header {
      background: #000;
      border-bottom: 1px solid #E23E3E;
      padding: 20px 16px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drawer-title {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .drawer-title span { color: #E23E3E; }
    .drawer-close {
      background: none;
      border: none;
      color: #E23E3E;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      display: flex;
    }
    .drawer-section-title {
      font-size: 11px;
      font-weight: 600;
      color: #A0A0A0;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 16px 8px;
    }
    .drawer-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
      border-radius: 0;
    }
    .drawer-link:hover, .drawer-link:focus {
      background: rgba(226,62,62,0.1);
      color: #E23E3E;
    }
    .drawer-link i {
      font-size: 20px;
      width: 24px;
      color: #E23E3E;
      text-align: center;
    }
    .drawer-divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 4px 16px;
    }

    /* ===== BOTTOM TAB BAR ===== */
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1040;
      background-color: #000000;
      border-top: 1.5px solid #E23E3E;
      height: 60px;
      display: flex;
      align-items: flex-start;
      padding-top: 6px;
      box-shadow: 0 -4px 15px rgba(226, 62, 62, 0.2);
      overflow: visible; /* permet au FAB de dépasser vers le haut */
    }

    .bottom-nav .tabs {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding: 0;
      margin: 0;
      list-style: none;
      overflow: visible;
    }

    .bottom-nav .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      overflow: visible;
    }

    .bottom-nav .tab-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: #A0A0A0;
      text-decoration: none;
      padding: 0;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .bottom-nav .tab-link i {
      font-size: 22px;
      line-height: 1;
    }

    .bottom-nav .tab-link span {
      font-size: 10px;
      font-weight: 500;
      line-height: 1;
    }

    .bottom-nav .tab-link.active {
      color: #E23E3E;
    }

    .bottom-nav .tab-link:hover {
      color: #E23E3E;
    }
  </style>
</head>
<body>
  <div id="app-shell">

    <!-- ===== DRAWER OVERLAY ===== -->
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

    <!-- ===== SIDE DRAWER ===== -->
    <nav class="drawer" id="side-drawer" aria-label="Menu principal">
      <div class="drawer-header">
        <div class="drawer-title">
          <img src="./assets/images/logo.png" alt="BF1 TV" style="height:40px;object-fit:contain;">
        </div>
        <button class="drawer-close" onclick="closeDrawer()" title="Fermer">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="drawer-section-title">Navigation</div>
      <a href="#/home"      class="drawer-link" onclick="closeDrawer()">Accueil</a>
      <a href="#/emissions" class="drawer-link" onclick="closeDrawer()">Émissions</a>
      <a href="#/live"      class="drawer-link" onclick="closeDrawer()">Direct Live</a>
      <a href="#/reels"     class="drawer-link" onclick="closeDrawer()">Reels</a>

      <hr class="drawer-divider">
      <div class="drawer-section-title">Actualités &amp; Émissions</div>
      <a href="#/news"           class="drawer-link" onclick="closeDrawer()">Flash Info</a>
      <a href="#/jtandmag"       class="drawer-link" onclick="closeDrawer()">JT &amp; Mag</a>
      <a href="#/divertissement" class="drawer-link" onclick="closeDrawer()">Divertissement</a>
      <a href="#/sports"         class="drawer-link" onclick="closeDrawer()">Sport</a>
      <a href="#/reportages"     class="drawer-link" onclick="closeDrawer()">Reportages</a>
      <a href="#/archive"        class="drawer-link" onclick="closeDrawer()">Archives</a>
      <a href="#/programs"       class="drawer-link" onclick="closeDrawer()">Calendrier</a>

      <hr class="drawer-divider">
      <div class="drawer-section-title">Films &amp; Séries</div>
      <a href="#/movies"  class="drawer-link" onclick="closeDrawer()">Films</a>

      <hr class="drawer-divider">
      <div class="drawer-section-title">Mon espace</div>
      <a href="#/profile"       class="drawer-link" onclick="closeDrawer()">Mon compte</a>
      <a href="#/favorites"     class="drawer-link" onclick="closeDrawer()">Favoris</a>

      <hr class="drawer-divider">
      <a href="#/about"   class="drawer-link" onclick="closeDrawer()">À propos</a>
      <a href="#/support" class="drawer-link" onclick="closeDrawer()">Support</a>
    </nav>

    <!-- ===== TOP HEADER (identique React Native HomeStack) ===== -->
    <header class="app-header">
      <!-- Gauche: icône menu hamburger -->
      <button class="header-icon" onclick="openDrawer()" title="Menu" style="background:none;border:none;">
        <i class="bi bi-list"></i>
      </button>

      <!-- Centre: titre BF1 TV centré, gras, blanc -->
      <div class="brand">BF1 TV</div>

      <!-- Droite: search + notifications -->
      <div style="display:flex;gap:4px;align-items:center;">
        <a href="#/search" class="header-icon" title="Rechercher">
          <i class="bi bi-search"></i>
        </a>
        <a href="#/notifications" class="header-icon" id="notif-icon" title="Notifications" style="position:relative;">
          <i class="bi bi-bell"></i>
          <span id="notif-badge" style="display:none;position:absolute;top:2px;right:2px;width:8px;height:8px;background:#E23E3E;border-radius:50%;"></span>
        </a>
      </div>
    </header>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main id="app-content"></main>

    <!-- ===== BOTTOM TAB BAR (identique React Native AppNavigation) ===== -->
    <nav class="bottom-nav">
      <ul class="tabs">

        <!-- Accueil -->
        <li class="tab-item">
          <a class="tab-link active" href="#/home" data-route="#/home" id="tab-home">
            <i class="bi bi-house-fill"></i>
            <span>Accueil</span>
          </a>
        </li>

        <!-- Émissions -->
        <li class="tab-item">
          <a class="tab-link" href="#/emissions" data-route="#/emissions" id="tab-emissions">
            <i class="bi bi-tv"></i>
            <span>Émissions</span>
          </a>
        </li>

        <!-- Live -->
        <li class="tab-item">
          <a class="tab-link" href="#/live" data-route="#/live" id="tab-live">
            <i class="bi bi-broadcast"></i>
            <span>Live</span>
          </a>
        </li>

        <!-- Reels -->
        <li class="tab-item">
          <a class="tab-link" href="#/reels" data-route="#/reels" id="tab-reels">
            <i class="bi bi-play-circle"></i>
            <span>Reels</span>
          </a>
        </li>

        <!-- Mon compte -->
        <li class="tab-item">
          <a class="tab-link" href="#/profile" data-route="#/profile" id="tab-profile">
            <i class="bi bi-person-circle"></i>
            <span>Mon compte</span>
          </a>
        </li>

      </ul>
    </nav>

  </div>

  <!-- Page Loader -->
  <div id="page-loader" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center d-none" style="z-index: 9999; background: #000000;">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function openDrawer() {
      document.getElementById('side-drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('side-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    // Fermer avec Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
