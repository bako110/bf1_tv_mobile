<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: #fff;
    }
    .loader-container {
      text-align: center;
    }
    .logo {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #e8222a 0%, #ff4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(232, 34, 42, 0.1);
      border-top-color: #e8222a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      color: #999;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <script>
    // Fonction pour détecter si on est dans Capacitor (app mobile)
    function isCapacitor() {
      return window.Capacitor !== undefined;
    }

    // Fonction pour détecter si on est sur un appareil mobile (navigateur)
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    // Fonction de redirection
    function redirect() {
      if (isCapacitor()) {
        // Dans l'app Capacitor -> version mobile
        console.log('🚀 Détection: App Capacitor - Redirection vers mobile');
        window.location.href = '/mobile/index.html';
      } else if (isMobileDevice()) {
        // Sur mobile dans un navigateur -> version mobile
        console.log('📱 Détection: Navigateur mobile - Redirection vers mobile');
        window.location.href = '/mobile/index.html';
      } else {
        // Sur desktop dans un navigateur -> page d'accueil web
        console.log('💻 Détection: Navigateur desktop - Redirection vers accueil web');
        window.location.href = '/web/index.html';
      }
    }

    // Attendre un court instant pour que Capacitor se charge si présent
    if (window.Capacitor) {
      redirect();
    } else {
      // Attendre 100ms pour laisser le temps à Capacitor de s'initialiser
      setTimeout(redirect, 100);
    }
  </script>
</body>
</html>
