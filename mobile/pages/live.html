<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct - BF1</title>
</head>
<body style="margin:0;overflow:hidden;">

<style>
  @keyframes livePulse {
    0%, 100% { opacity:1; transform:scale(1); }
    50%       { opacity:0.3; transform:scale(1.4); }
  }
  @keyframes liveSpin { to { transform:rotate(360deg); } }

  /* Layout principal de la page live */
  #live-page {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #000;
  }

  /* Zone vidéo : taille fixe, ne scrolle pas */
  #live-video-container {
    flex-shrink: 0;
    background: #000;
  }

  /* Sections : prend tout l'espace restant + scroll indépendant */
  #live-sections {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    background: #0d0d0d;
    border-radius: 16px 16px 0 0;
    position: relative;
    z-index: 1;
    margin-top: -1px;
  }

  /* Thème clair : sections scrollables */
  [data-theme="light"] #live-page { background: #F2F2F2; }
  [data-theme="light"] #live-sections { background: #EEEEEE; border-top: 1px solid #DDDDDD; border-radius: 16px 16px 0 0; }
  /* Thème clair : barre de statut LIVE */
  [data-theme="light"] #live-page > div:first-child {
    background: #FFFFFF !important;
    border-bottom-color: #DDDDDD !important;
  }
  [data-theme="light"] #live-viewers-header {
    color: #555555 !important;
  }
  [data-theme="light"] #live-sections::-webkit-scrollbar { display: none; }

  /* ===== PLEIN ÉCRAN PORTRAIT ===== */
  #live-player-wrapper.live-fs {
    position: fixed !important;
    inset: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    z-index: 9999 !important;
    border-radius: 0 !important;
    background: #000 !important;
  }
  #live-player-wrapper.live-fs .live-ratio {
    position: absolute !important;
    inset: 0 !important;
    width: 100% !important;
    height: 100% !important;
    aspect-ratio: unset !important;
  }
  #live-player-wrapper.live-fs video {
    object-fit: contain !important;
    width: 100% !important;
    height: 100% !important;
  }

  /* Contrôles player */
  .live-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 16px 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 20;
  }
  .live-ctrl-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    color: #fff;
  }
  .live-ctrl-btn .live-ctrl-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: background .2s, transform .15s;
  }
  .live-ctrl-btn:active .live-ctrl-icon {
    background: rgba(255,255,255,0.28);
    transform: scale(0.92);
  }
  .live-ctrl-btn.live-ctrl-primary .live-ctrl-icon {
    width: 60px; height: 60px;
    font-size: 24px;
    background: rgba(226,62,62,0.88);
  }
  .live-ctrl-btn:active.live-ctrl-primary .live-ctrl-icon {
    background: rgba(226,62,62,1);
  }
  .live-ctrl-label {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
  }
  #live-fs-btn { transition:opacity .2s; }
  #live-fs-btn:active { opacity:.6; }
</style>

<!-- Wrapper principal flex colonne -->
<div id="live-page">

  <!-- Barre de statut LIVE (au-dessus de la vidéo) -->
  <div style="display:flex;align-items:center;justify-content:space-between;
              padding:10px 14px;border-bottom:1px solid #1a1a1a;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="width:8px;height:8px;border-radius:50%;background:#E23E3E;
             animation:livePulse 1.4s ease-in-out infinite;display:inline-block;"></span>
      <span style="font-size:13px;color:#E23E3E;font-weight:700;letter-spacing:.5px;">EN DIRECT</span>
    </div>
    <span id="live-viewers-header" style="display:none;align-items:center;gap:4px;
          font-size:12px;color:rgba(255,255,255,0.55);">
      <i class="bi bi-eye"></i>
      <span id="live-viewers-count">0</span> spectateurs
    </span>
  </div>

  <!-- Lecteur vidéo (taille fixe) -->
  <div id="live-video-container">
    <div style="display:flex;justify-content:center;align-items:center;
                aspect-ratio:16/9;background:#0a0a0a;">
      <div style="width:36px;height:36px;border:3px solid #1a1a1a;
                  border-top-color:#E23E3E;border-radius:50%;
                  animation:liveSpin 0.75s linear infinite;"></div>
    </div>
  </div>

  <!-- Sections de contenu (scrollables) -->
  <div id="live-sections">
    <!-- Drag handle -->
    <div style="display:flex;justify-content:center;padding:10px 0 6px;">
      <div style="width:36px;height:4px;background:#2a2a2a;border-radius:2px;"></div>
    </div>
    <div style="display:flex;justify-content:center;padding:20px 0 28px;">
      <div style="width:26px;height:26px;border:2px solid #1a1a1a;
                  border-top-color:#444;border-radius:50%;
                  animation:liveSpin 0.75s linear infinite;"></div>
    </div>
  </div>

</div>

</body>
</html>
