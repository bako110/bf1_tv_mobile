<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <title>Programmes - BF1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body style="background:var(--bg,#000);min-height:100vh;color:var(--text,#fff);">

  <!-- Sticky header -->
  <div class="sticky-top" style="background:var(--bg,#000);border-bottom:1px solid var(--divider,#1e1e1e);z-index:10;">
    <div class="d-flex align-items-center justify-content-between px-3 py-3">
      <h1 class="mb-0 fw-bold" style="font-size:20px;color:#fff;">Programmes</h1>
      <i class="bi bi-calendar-event" style="font-size:22px;color:#E23E3E;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'" onclick="window._openCalendarModal()"></i>
    </div>
  </div>

  <!-- Calendrier semaine horizontal -->
  <div id="programs-calendar" style="background:#000;border-bottom:1px solid #1e1e1e;"></div>

  <!-- Sélecteur de jours -->
  <div id="programs-days" style="background:#000;border-bottom:1px solid #1e1e1e;"></div>

  <!-- Programmes groupés par jour -->
  <div id="programs-list" style="padding-bottom:70px;"></div>

</body>
</html>
