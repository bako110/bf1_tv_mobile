  <style>
    :root {
      --bf1-primary: #E23E3E;
      --bf1-bg-dark: #0d0d0d;
      --bf1-bg-card: #1a1a1a;
      --bf1-text-primary: #FFFFFF;
      --bf1-text-secondary: #999999;
      --bf1-border-subtle: rgba(255, 255, 255, 0.1);
    }

    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: var(--bf1-bg-dark) !important;
    }

    .bf1-home-container {
      color: var(--bf1-text-primary);
      padding-top: 0;
      background: var(--bf1-bg-dark);
      min-height: 100vh;
    }

    /* ===== LIVE HERO SECTION ===== */
    .bf1-live-hero {
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .bf1-live-wrapper {
      position: relative;
      border-radius: 0;
      overflow: hidden;
      background: #000;
    }

    .bf1-live-skeleton {
      min-height: 56.25vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    /* ===== SECTION STYLING ===== */
    .bf1-content-section {
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .bf1-content-section[data-animate] {
      animation-delay: calc(var(--section-index, 0) * 0.1s);
    }

    .bf1-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      margin-bottom: 18px;
      gap: 12px;
    }

    .bf1-section-title {
      font-size: 24px;
      font-weight: 800;
      margin: 0;
      color: #FFFFFF;
      letter-spacing: -0.6px;
      font-family: 'Inter', sans-serif;
      position: relative;
      flex: 1;
    }

    .bf1-section-title::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 40px;
      height: 3px;
      background: var(--bf1-primary);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bf1-section-header:hover .bf1-section-title::after {
      width: 60px;
    }

    /* Flèche ultra moderne */
    .bf1-see-more-arrow {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--bf1-text-primary);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .bf1-see-more-arrow::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(226, 62, 62, 0.1) 0%, rgba(226, 62, 62, 0.05) 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .bf1-see-more-arrow:hover {
      background: rgba(226, 62, 62, 0.15);
      border-color: rgba(226, 62, 62, 0.4);
      transform: translateX(4px) scale(1.05);
      box-shadow: 0 4px 20px rgba(226, 62, 62, 0.3);
    }

    .bf1-see-more-arrow:hover::before {
      opacity: 1;
    }

    .bf1-see-more-arrow:active {
      transform: translateX(2px) scale(0.98);
    }

    .bf1-see-more-arrow svg {
      position: relative;
      z-index: 1;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bf1-see-more-arrow:hover svg {
      transform: translateX(3px);
    }

    /* Animation de la ligne de la flèche */
    .bf1-see-more-arrow .arrow-line {
      stroke-dasharray: 14;
      stroke-dashoffset: 14;
      transition: stroke-dashoffset 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bf1-see-more-arrow:hover .arrow-line {
      stroke-dashoffset: 0;
    }

    /* Animation de la tête de la flèche */
    .bf1-see-more-arrow .arrow-head {
      transform-origin: center;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bf1-see-more-arrow:hover .arrow-head {
      transform: translateX(2px);
    }

    /* Glow effect au hover */
    @keyframes glowPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(226, 62, 62, 0.4);
      }
      50% {
        box-shadow: 0 0 0 4px rgba(226, 62, 62, 0);
      }
    }

    .bf1-see-more-arrow:hover {
      animation: glowPulse 1.5s infinite;
    }

    /* ===== SCROLL CONTAINER ===== */
    .bf1-scroll-container {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 12px;
      padding: 0 16px 16px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
    }

    .bf1-scroll-container::-webkit-scrollbar {
      display: none;
    }

    .bf1-scroll-container > * {
      scroll-snap-align: start;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes livePulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.4;
        transform: scale(0.8);
      }
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%) translateY(-100%) rotate(45deg);
      }
      100% {
        transform: translateX(100%) translateY(100%) rotate(45deg);
      }
    }

    @keyframes bf1Shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    /* ===== SECTION ANIMATION DELAYS ===== */
    #flashInfo-section { --section-index: 1; }
    #missed-section { --section-index: 2; }
    #jtMag-section { --section-index: 3; }
    #teleRealite-section { --section-index: 4; }
    #divertissements-section { --section-index: 5; }
    #sports-section { --section-index: 6; }
    #reportages-section { --section-index: 7; }
    #archives-section { --section-index: 8; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .bf1-section-title {
        font-size: 20px;
      }

      .bf1-see-more-arrow {
        width: 40px;
        height: 40px;
      }
    }
  </style>
