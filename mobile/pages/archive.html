<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archives - BF1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    /* Les icônes suivent les variables CSS du ThemeManager */
    .bi,
    [class^="bi-"],
    [class*=" bi-"] {
      color: var(--icon-color, var(--text, #FFFFFF));
    }
    
    /* Style spécifique pour les icônes dans les boutons */
    button i,
    .btn i {
      color: var(--icon-color, var(--text, #FFFFFF));
    }
  </style>
</head>
<body class="d-none" id="archive-page" style="min-height:100vh;">
  <div class="sticky-top" style="z-index:10;">
    <div class="d-flex align-items-center justify-content-between px-3 pt-3 pb-2">
      <span style="font-size:16px;font-weight:700;">Archives</span>
      <button id="archive-toggle-btn" type="button" style="border-radius:8px;padding:6px 10px;line-height:1;">
        <i class="bi bi-list" id="archive-toggle-icon"></i>
      </button>
    </div>
  </div>
  <div id="archive-list"></div>
</body>
</html>
