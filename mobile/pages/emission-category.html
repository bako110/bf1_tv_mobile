<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Émission - BF1</title>
</head>
<body style="background:#000;min-height:100vh;color:#fff;">

  <!-- Header sticky -->
  <div class="sticky-top" style="background:#000;border-bottom:1px solid #1e1e1e;z-index:10;">
    <div class="d-flex align-items-center gap-2 px-3 py-3">
      <button onclick="history.back()"
              style="background:none;border:none;color:#fff;padding:0;line-height:1;cursor:pointer;">
        <i class="bi bi-arrow-left" style="font-size:22px;color:var(--header-back-btn, #E23E3E);"></i>
      </button>
      <h1 class="mb-0 fw-bold flex-grow-1" id="emcat-title"
          style="font-size:18px;color:var(--header-back-btn, #E23E3E);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">
        Émission
      </h1>
      <i class="bi bi-tv-fill" style="font-size:18px;color:var(--header-back-btn, #E23E3E);"></i>
    </div>
  </div>

  <div id="emcat-container" style="padding-bottom:70px;"></div>

</body>
</html>
