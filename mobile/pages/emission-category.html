<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Émission - BF1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }

    @keyframes emcat-shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    @keyframes emcat-fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header flottant ── */
    #emcat-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: transparent; transition: background .25s;
    }
    #emcat-header.scrolled {
      background: rgba(6,6,6,.95);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    #emcat-header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px 10px;
      padding-top: max(env(safe-area-inset-top, 12px), 12px);
    }
    #emcat-back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(0,0,0,.35); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background .15s, transform .1s;
    }
    #emcat-back-btn:active { background: rgba(226,62,62,.4); transform: scale(.88); }
    .emcat-header-actions { display: flex; gap: 8px; }
    .emcat-header-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(0,0,0,.35); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 16px;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, transform .1s;
    }
    .emcat-header-btn:active { transform: scale(.88); }

    /* ── Hero ── */
    #emcat-hero {
      position: relative; width: 100%;
      height: 75vw; min-height: 280px; max-height: 420px;
      overflow: hidden; background: #111;
    }
    #emcat-hero-img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block;
    }
    #emcat-hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.15) 0%, transparent 35%, rgba(10,10,10,.97) 100%);
    }
    #emcat-hero-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 16px 18px; z-index: 2;
    }
    #emcat-hero-title {
      font-size: 24px; font-weight: 900; color: #fff;
      letter-spacing: -.5px; margin: 0 0 4px; line-height: 1.15;
      text-shadow: 0 2px 16px rgba(0,0,0,.7);
    }
    #emcat-hero-schedule {
      font-size: 13px; color: rgba(255,255,255,.6);
      font-weight: 400; margin: 0;
    }

    /* ── Onglets ── */
    #emcat-tabs {
      display: flex; border-bottom: 1px solid rgba(255,255,255,.1);
      padding: 0 16px; gap: 0; background: #0a0a0a;
      position: sticky; top: 56px; z-index: 50;
    }
    .emcat-tab {
      padding: 14px 16px 12px; font-size: 14px; font-weight: 600;
      color: rgba(255,255,255,.45); cursor: pointer; position: relative;
      -webkit-tap-highlight-color: transparent; transition: color .2s;
      border: none; background: none; white-space: nowrap;
    }
    .emcat-tab.active { color: #fff; }
    .emcat-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: #fff; border-radius: 2px;
    }

    /* ── Section "Découvrez aussi" ── */
    #emcat-discover-section { padding: 20px 0 4px; }
    #emcat-discover-title {
      font-size: 16px; font-weight: 800; color: #fff;
      padding: 0 16px; margin-bottom: 14px; letter-spacing: -.3px;
    }
    #emcat-discover-scroll {
      display: flex; overflow-x: auto; gap: 12px;
      padding: 0 16px 12px; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #emcat-discover-scroll::-webkit-scrollbar { display: none; }
    .emcat-discover-card {
      flex-shrink: 0; width: 120px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: transform .15s;
      text-decoration: none;
    }
    .emcat-discover-card:active { transform: scale(.95); }
    .emcat-discover-thumb {
      position: relative; width: 120px; height: 160px;
      border-radius: 12px; overflow: hidden; background: #1a1a1a;
    }
    .emcat-discover-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .emcat-discover-plus {
      position: absolute; bottom: 7px; right: 7px;
      width: 26px; height: 26px; border-radius: 6px;
      background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px;
    }
    .emcat-discover-name {
      font-size: 11px; font-weight: 700; color: #fff;
      margin-top: 7px; text-align: center;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ── Liste épisodes ── */
    #emcat-list-section { padding-bottom: 90px; }
    #emcat-list { display: flex; flex-direction: column; }

    /* ── Episode row ── */
    .emcat-ep-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      cursor: pointer;
      opacity: 0; transform: translateY(8px);
      animation: emcat-fadein .3s cubic-bezier(0.16,1,0.3,1) forwards;
      -webkit-tap-highlight-color: transparent;
    }
    .emcat-ep-row:active { background: rgba(255,255,255,.04); }

    .emcat-ep-thumb {
      position: relative; flex-shrink: 0;
      width: 118px; height: 76px;
      border-radius: 10px; overflow: hidden; background: #1a1a1a;
    }
    .emcat-ep-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .emcat-ep-dur {
      position: absolute; bottom: 5px; right: 5px;
      background: rgba(0,0,0,.8); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
    }
    .emcat-ep-play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.25); opacity: 0; transition: opacity .15s;
    }
    .emcat-ep-row:active .emcat-ep-play { opacity: 1; }
    .emcat-ep-play i { font-size: 22px; color: #fff; }

    .emcat-ep-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .emcat-ep-badges { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .emcat-ep-new {
      background: #0E7AFE; color: #fff; font-size: 9px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
    }
    .emcat-ep-views { font-size: 10px; color: rgba(255,255,255,.4); font-weight: 500; }
    .emcat-ep-date { font-size: 10px; color: rgba(255,255,255,.35); font-weight: 400; }
    .emcat-ep-title {
      font-size: 13px; font-weight: 700; color: #fff; line-height: 1.35;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical;
    }

    .emcat-ep-plus {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      color: #fff; cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: transform .1s;
    }
    .emcat-ep-plus:active { transform: scale(.85); }

    #emcat-container { padding-bottom: 90px; }
  </style>
</head>
<body>

  <div id="emcat-header">
    <div id="emcat-header-inner">
      <button onclick="history.back()" id="emcat-back-btn" aria-label="Retour">
        <i class="bi bi-arrow-left" style="font-size:17px;color:#fff;"></i>
      </button>
      <div class="emcat-header-actions">
        <button class="emcat-header-btn" onclick="navigator.share&&navigator.share({url:location.href,title:document.title}).catch(()=>{})">
          <i class="bi bi-share"></i>
        </button>
        <button class="emcat-header-btn" id="emcat-fav-header-btn">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="emcat-container"></div>

  <script>
    (function() {
      const hdr = document.getElementById('emcat-header');
      window.addEventListener('scroll', function() {
        const hero = document.getElementById('emcat-hero');
        const threshold = hero ? hero.offsetHeight - 56 : 100;
        hdr.classList.toggle('scrolled', window.scrollY > threshold);
      }, { passive: true });
    })();
  </script>

</body>
</html>
