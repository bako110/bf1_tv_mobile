<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Télé Réalité - BF1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    .bi, [class^="bi-"], [class*=" bi-"] { color: var(--icon-color, var(--text, #FFFFFF)); }
    button i, .btn i { color: var(--icon-color, var(--text, #FFFFFF)); }
  </style>
</head>
<body class="d-none" id="tele-realite-page" style="min-height:100vh;">
  <div class="sticky-top" style="z-index:10;">
    <div class="d-flex align-items-center justify-content-between px-3 pt-3 pb-2">
      <span style="font-size:20px;font-weight:700;">Télé Réalité et Événements</span>
      <button id="tele-realite-toggle-btn" type="button" style="border-radius:8px;padding:6px 10px;line-height:1;">
        <i class="bi bi-list" id="tele-realite-toggle-icon"></i>
      </button>
    </div>
  </div>
  <div id="tele-realite-list"></div>
</body>
</html>
