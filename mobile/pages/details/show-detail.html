<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail - BF1</title>
  <style>
    :root { --sd-accent:#E23E3E; }

    /* ── Keyframes globaux ── */
    @keyframes sd-fadeUp   { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes sd-fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes sd-scaleIn  { from { opacity:0; transform:scale(.93); } to { opacity:1; transform:scale(1); } }
    @keyframes sd-shimmer  {
      0%   { background-position:-200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes sd-pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.3;} }

    /* ── Hero floating back btn ── */
    #sd-hero-back {
      position: fixed;
      top: env(safe-area-inset-top, 12px);
      left: 14px;
      z-index: 50;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      animation: sd-fadeIn .4s ease;
      transition: background .2s, transform .15s;
    }
    #sd-hero-back:active { transform: scale(.88); background: rgba(226,62,62,.7); }

    /* ── Shimmer skeleton ── */
    .sd-skeleton {
      background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: sd-shimmer 1.4s infinite;
      border-radius: 6px;
    }

    /* ── Content card ── */
    #sd-content-card {
      position: relative;
      z-index: 5;
      background: var(--bg-1, #0a0a0a);
      border-radius: 22px 22px 0 0;
      margin-top: -24px;
      padding: 22px 18px 0;
      animation: sd-fadeUp .45s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Actions pills ── */
    .sd-action-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--bg-3, rgba(255,255,255,.06));
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 50px;
      padding: 9px 16px;
      font-size: 13px;
      color: var(--body-muted, #999);
      cursor: pointer;
      transition: background .2s, border-color .2s, color .2s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sd-action-pill:active { transform: scale(.92); }
    .sd-action-pill.active-red   { background:rgba(226,62,62,.18); border-color:#E23E3E; color:#E23E3E; }
    .sd-action-pill.active-amber { background:rgba(245,158,11,.18); border-color:#F59E0B; color:#F59E0B; }

    /* ── Share btn compact ── */
    .sd-share-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.09);
      background: var(--bg-3, rgba(255,255,255,.06));
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      transition: background .2s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sd-share-btn:active { transform: scale(.88); }
    .sd-share-btn.fb  { background: rgba(24,119,242,.2);  border-color: rgba(24,119,242,.4);  color:#1877F2; }
    .sd-share-btn.wa  { background: rgba(37,211,102,.2);  border-color: rgba(37,211,102,.4);  color:#25D366; }
    .sd-share-btn.tw  { background: rgba(29,161,242,.2);  border-color: rgba(29,161,242,.4);  color:#1DA1F2; }
    .sd-share-btn.share { background:rgba(226,62,62,.15); border-color:rgba(226,62,62,.35); color:#E23E3E; }

    /* ── Related horizontal scroll ── */
    #sd-related-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 4px 0 12px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #sd-related-scroll::-webkit-scrollbar { display: none; }

    .sd-related-card {
      flex-shrink: 0;
      width: 148px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-3, #161616);
      border: 1px solid rgba(255,255,255,.07);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      animation: sd-scaleIn .4s ease both;
    }
    .sd-related-card:active { transform: scale(.95); }

    /* ── Section titles ── */
    .sd-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--body-muted, #666);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 12px;
    }

    /* ── Description expand ── */
    #sd-desc-inner {
      overflow: hidden;
      max-height: calc(1.7em * 4);
      transition: max-height .4s cubic-bezier(.22,1,.36,1);
    }
    #sd-desc-inner.expanded { max-height: 1000px; }

    /* ── Divider ── */
    .sd-divider { height: 1px; background: rgba(255,255,255,.07); margin: 20px 0; }
  </style>
</head>
<body style="background:var(--bg-1,#0a0a0a);min-height:100vh;color:var(--text,#fff);">

  <!-- Bouton retour flottant -->
  <button id="sd-hero-back" onclick="history.back()" aria-label="Retour">
    <i class="bi bi-arrow-left" style="font-size:18px;color:#fff;"></i>
  </button>

  <!-- Contenu principal -->
  <div id="sd-container" style="padding-bottom:100px;">
    <!-- Skeleton loader -->
    <div id="sd-skeleton">
      <style>
        @keyframes sd-shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        .sd-skeleton {
          background:linear-gradient(90deg,#1a1a1a 25%,#2a2a2a 50%,#1a1a1a 75%);
          background-size:200% 100%;
          animation:sd-shimmer 1.4s infinite;
          border-radius:6px;
        }
        @keyframes sd-fadeIn  { from{opacity:0} to{opacity:1} }
        #sd-hero-back {
          position:fixed; top:env(safe-area-inset-top,12px); left:14px; z-index:50;
          width:38px; height:38px; border-radius:50%;
          background:rgba(0,0,0,.55); backdrop-filter:blur(10px);
          -webkit-backdrop-filter:blur(10px);
          border:1px solid rgba(255,255,255,.12);
          display:flex; align-items:center; justify-content:center;
          cursor:pointer; animation:sd-fadeIn .4s ease;
          transition:background .2s,transform .15s;
        }
        #sd-hero-back:active { transform:scale(.88); background:rgba(226,62,62,.7); }
      </style>
      <div class="sd-skeleton" style="width:100%;height:240px;border-radius:0;"></div>
      <div style="padding:22px 18px;background:var(--bg-1,#0a0a0a);border-radius:22px 22px 0 0;margin-top:-24px;">
        <div class="sd-skeleton" style="height:14px;width:80px;margin-bottom:14px;"></div>
        <div class="sd-skeleton" style="height:22px;width:90%;margin-bottom:8px;"></div>
        <div class="sd-skeleton" style="height:22px;width:65%;margin-bottom:20px;"></div>
        <div style="display:flex;gap:10px;margin-bottom:20px;">
          <div class="sd-skeleton" style="height:38px;width:90px;border-radius:50px;"></div>
          <div class="sd-skeleton" style="height:38px;width:110px;border-radius:50px;"></div>
          <div class="sd-skeleton" style="height:38px;width:50px;border-radius:50px;"></div>
        </div>
        <div class="sd-skeleton" style="height:13px;width:100%;margin-bottom:8px;"></div>
        <div class="sd-skeleton" style="height:13px;width:85%;margin-bottom:8px;"></div>
        <div class="sd-skeleton" style="height:13px;width:70%;"></div>
      </div>
    </div>
  </div>

</body>
</html>
