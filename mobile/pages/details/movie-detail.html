<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail - BF1</title>
</head>
<body style="background:var(--bg,#000);min-height:100vh;color:var(--text,#fff);">

  <!-- Header sticky -->
  <div class="sticky-top" style="background:var(--bg,#000);border-bottom:1px solid var(--divider,#1e1e1e);z-index:10;">
    <div class="d-flex align-items-center gap-2 px-3 py-3">
      <button onclick="history.back()"
              style="background:none;border:none;color:#fff;padding:0;line-height:1;cursor:pointer;">
        <i class="bi bi-arrow-left" style="font-size:22px;"></i>
      </button>
      <h1 class="mb-0 fw-bold flex-grow-1" style="font-size:18px;color:#fff;
          overflow:hidden;white-space:nowrap;text-overflow:ellipsis;" id="sd-header-title">Détail</h1>
    </div>
  </div>

  <!-- Contenu principal -->
  <div id="sd-container" style="padding-bottom:90px;">
    <div class="d-flex justify-content-center align-items-center" style="height:300px;">
      <div class="spinner-border text-danger" role="status"></div>
    </div>
  </div>

</body>
</html>
