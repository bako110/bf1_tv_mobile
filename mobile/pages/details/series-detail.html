<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Série - BF1</title>
</head>
<body style="background:var(--bg,#000);min-height:100vh;color:var(--text,#fff);">

  <!-- Header sticky -->
  <div class="sticky-top" style="background:var(--bg,#000);border-bottom:1px solid var(--divider,#1e1e1e);z-index:10;">
    <div class="d-flex align-items-center gap-2 px-3 py-3">
      <button onclick="history.back()"
              style="background:none;border:none;color:#fff;padding:0;line-height:1;cursor:pointer;">
        <i class="bi bi-arrow-left" style="font-size:22px;"></i>
      </button>
      <span id="sd2-header-title" style="font-size:14px;font-weight:700;color:#E23E3E;letter-spacing:.3px;"></span>
    </div>
  </div>

  <!-- Contenu principal -->
  <div id="sd2-container" style="padding-bottom:90px;">
    <div class="d-flex justify-content-center align-items-center" style="height:300px;">
      <div class="spinner-border text-danger" role="status"></div>
    </div>
  </div>

  <!-- Episode player overlay -->
  <div id="ep-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1050;">
    <div id="ep-sheet" style="position:absolute;bottom:0;left:0;right:0;background:#111;
         border-radius:20px 20px 0 0;padding:0 0 80px;max-height:92vh;overflow-y:auto;
         transform:translateY(100%);transition:transform .3s ease;">
      <div class="d-flex align-items-center justify-content-between px-3 py-3"
           style="border-bottom:1px solid #222;">
        <h3 id="ep-title" class="mb-0 fw-bold" style="font-size:16px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;"></h3>
        <button onclick="closeEpPlayer()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 0 0 12px;">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div id="ep-video-wrap"></div>
      <div id="ep-desc" class="px-3 pt-2" style="color:#A0A0A0;font-size:14px;line-height:1.6;"></div>
    </div>
  </div>

</body>
</html>
