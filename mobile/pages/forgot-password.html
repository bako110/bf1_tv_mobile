<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublie - BF1</title>
</head>
<body style="background:var(--bg,#000);min-height:100vh;color:var(--text,#fff);">

  <!-- Header -->
  <div style="display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid #1a1a1a;">
    <button onclick="history.back()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;">
      <i class="bi bi-arrow-left"></i>
    </button>
    <span style="font-size:16px;font-weight:600;">Mot de passe oublie</span>
  </div>

  <!-- Corps -->
  <div style="padding:40px 24px;max-width:420px;margin:0 auto;">

    <!-- Icone -->
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:80px;height:80px;background:rgba(226,62,62,.12);border-radius:50%;
                  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <i class="bi bi-key-fill" style="font-size:34px;color:#E23E3E;"></i>
      </div>
      <h2 style="color:#fff;font-size:20px;font-weight:700;margin:0 0 8px;">Reinitialiser le mot de passe</h2>
      <p style="color:#666;font-size:13px;line-height:1.6;margin:0;">
        Entrez votre adresse email. Nous vous enverrons un lien pour reinitialiser votre mot de passe.
      </p>
    </div>

    <!-- Messages -->
    <div id="fp-message" style="margin-bottom:16px;"></div>

    <!-- Formulaire -->
    <div id="fp-form-wrap">
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:12px;color:#888;margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em;">
          Adresse email
        </label>
        <input type="email" id="fp-email"
               style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px;
                      padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;
                      -webkit-appearance:none;"
               onfocus="this.style.borderColor='#E23E3E'" onblur="this.style.borderColor='#2a2a2a'"
               placeholder="exemple@email.com"
               required>
      </div>

      <button id="fp-btn"
              style="width:100%;background:#E23E3E;border:none;border-radius:12px;
                     padding:15px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;
                     display:flex;align-items:center;justify-content:center;gap:8px;">
        <i class="bi bi-send-fill"></i> Envoyer le lien
      </button>
    </div>

    <!-- Succes (cache par defaut) -->
    <div id="fp-success" style="display:none;text-align:center;padding:8px 0;">
      <div style="width:64px;height:64px;background:rgba(34,197,94,.12);border-radius:50%;
                  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i class="bi bi-check-circle-fill" style="font-size:30px;color:#22c55e;"></i>
      </div>
      <h3 style="color:#fff;font-size:18px;font-weight:700;margin:0 0 8px;">Email envoye !</h3>
      <p style="color:#888;font-size:13px;line-height:1.6;margin:0 0 24px;">
        Si cette adresse correspond a un compte, vous recevrez un email avec les instructions.
      </p>
    </div>

    <div style="text-align:center;margin-top:24px;">
      <a href="#/login" style="color:#E23E3E;font-size:14px;text-decoration:none;font-weight:500;">
        <i class="bi bi-arrow-left" style="font-size:12px;"></i> Retour a la connexion
      </a>
    </div>
  </div>

</body>
</html>
