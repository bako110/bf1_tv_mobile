<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - BF1</title>
</head>
<body style="background:#000;min-height:100vh;color:#fff;">
  <style>
    .soc-btn{width:100%;display:flex;align-items:center;gap:12px;background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:13px 16px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:10px;box-sizing:border-box;}
    .soc-btn:active{background:#1a1a1a;}
    .soc-btn svg{flex-shrink:0;}
    .soc-btn span{flex:1;text-align:center;}
    .pwd-wrap{position:relative;}
    .pwd-wrap input{padding-right:46px!important;}
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;padding:0;font-size:18px;}
  </style>

  <div style="display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid #1a1a1a;">
    <button onclick="history.back()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;">
      <i class="bi bi-arrow-left"></i>
    </button>
    <span style="font-size:16px;font-weight:600;">Connexion</span>
  </div>

  <div style="padding:24px 24px 48px;max-width:420px;margin:0 auto;">

    <div style="text-align:center;margin-bottom:24px;">
      <img src="./assets/images/logo.png" alt="BF1 TV"
           style="width:76px;height:76px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(226,62,62,.5));">
      <h2 style="color:#fff;font-size:19px;font-weight:700;margin:10px 0 3px;">Content de vous revoir</h2>
      <p style="color:#666;font-size:13px;margin:0;">Connectez-vous a votre compte BF1</p>
    </div>

    <div id="login-message" style="margin-bottom:12px;"></div>

    <form id="login-form">
      <div style="margin-bottom:12px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:7px;">Email ou nom d'utilisateur</label>
        <input type="text" name="identifier"
               style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;-webkit-appearance:none;"
               onfocus="this.style.borderColor='#E23E3E'" onblur="this.style.borderColor='#2a2a2a'"
               required>
      </div>

      <div style="margin-bottom:6px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
          <label style="font-size:13px;color:#888;">Mot de passe</label>
          <a href="#/forgot-password" style="font-size:12px;color:#E23E3E;text-decoration:none;font-weight:500;">Mot de passe oublie ?</a>
        </div>
        <div class="pwd-wrap">
          <input type="password" name="password" id="login-pwd"
                 style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;-webkit-appearance:none;"
                 onfocus="this.style.borderColor='#E23E3E'" onblur="this.style.borderColor='#2a2a2a'"
                 required>
          <button type="button" class="eye-btn" id="pwd-eye"><i class="bi bi-eye"></i></button>
        </div>
      </div>

      <button type="submit" id="login-btn"
              style="width:100%;background:#E23E3E;border:none;border-radius:12px;padding:15px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;">
        <i class="bi bi-box-arrow-in-right"></i> Se connecter
      </button>
    </form>

    <div style="display:flex;align-items:center;gap:10px;margin:22px 0;">
      <div style="flex:1;height:1px;background:#1e1e1e;"></div>
      <span style="color:#555;font-size:12px;white-space:nowrap;">ou continuer avec</span>
      <div style="flex:1;height:1px;background:#1e1e1e;"></div>
    </div>

    <button class="soc-btn" id="btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path d="M43.6 20.1H42V20H24v8h11.3C33.7 32.8 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z" fill="#FFC107"/>
        <path d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" fill="#FF3D00"/>
        <path d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.6-3.2-11.3-7.7l-6.5 5C9.5 39.6 16.2 44 24 44z" fill="#4CAF50"/>
        <path d="M43.6 20.1H42V20H24v8h11.3a12 12 0 01-4.1 5.6l6.2 5.2C42 35.2 44 30 44 24c0-1.3-.1-2.6-.4-3.9z" fill="#1976D2"/>
      </svg>
      <span>Continuer avec Google</span>
    </button>

    <button class="soc-btn" id="btn-facebook">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <rect width="48" height="48" rx="8" fill="#1877F2"/>
        <path d="M33 24h-6v16h-6V24h-4v-6h4v-3.5C21 11.6 22.6 10 25.5 10H33v6h-4.5c-.8 0-1.5.7-1.5 1.5V18h6l-1 6z" fill="#fff"/>
      </svg>
      <span>Continuer avec Facebook</span>
    </button>

    <button class="soc-btn" id="btn-apple">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path d="M35.1 25.6c0-5 4.1-7.5 4.3-7.6-2.3-3.4-6-3.9-7.3-4-3.1-.3-6.1 1.8-7.6 1.8-1.6 0-4-1.8-6.6-1.7-3.4.1-6.5 2-8.2 5-3.5 6.1-.9 15.1 2.5 20 1.7 2.4 3.7 5.1 6.3 5 2.5-.1 3.5-1.6 6.5-1.6s3.9 1.6 6.6 1.6c2.7 0 4.4-2.5 6.1-4.9 1.9-2.8 2.7-5.5 2.8-5.7-.1 0-5.3-2-5.4-7.9zM29.9 10.7c1.4-1.7 2.3-4 2.1-6.4-2 .1-4.4 1.3-5.9 3-1.3 1.5-2.4 3.9-2.1 6.2 2.3.2 4.5-1.1 5.9-2.8z" fill="#fff"/>
      </svg>
      <span>Continuer avec Apple</span>
    </button>

    <div style="text-align:center;margin-top:24px;">
      <p style="color:#666;font-size:14px;margin-bottom:10px;">
        Pas de compte ?
        <a href="#/register" style="color:#E23E3E;text-decoration:none;font-weight:600;">S'inscrire</a>
      </p>
      <a href="#/home" style="color:#444;font-size:13px;text-decoration:none;">Continuer en tant qu'invite</a>
    </div>
  </div>

  <div id="login-toast" style="display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e1e1e;color:#fff;padding:11px 22px;border-radius:20px;font-size:13px;z-index:9999;white-space:nowrap;border:1px solid #2a2a2a;box-shadow:0 4px 20px rgba(0,0,0,.6);pointer-events:none;"></div>

</body>
</html>
