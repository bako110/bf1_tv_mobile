<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - BF1</title>
</head>
<body style="background:#000;min-height:100vh;color:#fff;">

  <!-- Header page avec bouton retour -->
  <div style="display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid #1a1a1a;">
    <button onclick="history.back()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;">
      <i class="bi bi-arrow-left"></i>
    </button>
    <span style="font-size:16px;font-weight:600;">Connexion</span>
  </div>

  <!-- Corps -->
  <div style="padding:32px 24px;max-width:420px;margin:0 auto;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px;">
      <img src="./assets/images/logo.png" alt="BF1 TV"
           style="width:88px;height:88px;object-fit:contain;
                  filter:drop-shadow(0 0 16px rgba(226,62,62,0.5));">
      <p style="color:#666;font-size:12px;margin:8px 0 0;font-style:italic;">La chaîne au cœur de nos défis</p>
    </div>

    <div id="login-message" style="margin-bottom:16px;"></div>

    <form id="login-form">

      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:8px;">Email ou nom d’utilisateur</label>
        <input type="text" name="identifier"
               style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px;
                      padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;
                      -webkit-appearance:none;"
               onfocus="this.style.borderColor='#E23E3E'" onblur="this.style.borderColor='#2a2a2a'"
               required>
      </div>

      <div style="margin-bottom:24px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:8px;">Mot de passe</label>
        <input type="password" name="password"
               style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px;
                      padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;
                      -webkit-appearance:none;"
               onfocus="this.style.borderColor='#E23E3E'" onblur="this.style.borderColor='#2a2a2a'"
               required>
      </div>

      <button type="submit"
              style="width:100%;background:#E23E3E;border:none;border-radius:12px;
                     padding:15px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;
                     display:flex;align-items:center;justify-content:center;gap:8px;">
        <i class="bi bi-box-arrow-in-right"></i> Se connecter
      </button>
    </form>

    <div style="text-align:center;margin-top:24px;">
      <p style="color:#666;font-size:14px;margin-bottom:12px;">
        Pas de compte ?
        <a href="#/register" style="color:#E23E3E;text-decoration:none;font-weight:600;">S’inscrire</a>
      </p>
      <a href="#/home" style="color:#444;font-size:13px;text-decoration:none;">Continuer en tant qu’invité</a>
    </div>
  </div>

</body>
</html>
