<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualités - BF1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="text-light d-none" id="news-page" style="background:#000;min-height:100vh;">

  <!-- Barre des catégories (sticky) -->
  <div class="sticky-top" style="background:#000;z-index:10;border-bottom:1px solid #1e1e1e;">
    <!-- Ligne titre + toggle -->
    <div class="d-flex align-items-center justify-content-between px-3 pt-3 pb-2">
      <span style="font-size:16px;font-weight:700;color:#fff;letter-spacing:0.3px;">Actualités</span>
      <button id="news-toggle-btn" type="button"
        style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:6px 10px;color:#B0B0B0;line-height:1;">
        <i class="bi bi-grid" id="news-toggle-icon"></i>
      </button>
    </div>
    <!-- Scroll catégories -->
    <div id="news-categories"
      class="d-flex gap-2 px-3 pb-3"
      style="overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;">
    </div>
  </div>

  <!-- Liste des news -->
  <div id="news-list"></div>

  <style>
    #news-categories::-webkit-scrollbar { display: none; }
  </style>
</body>
</html>
