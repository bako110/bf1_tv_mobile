<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualités - BF1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    /* Les icônes suivent les variables CSS du ThemeManager */
    .bi,
    [class^="bi-"],
    [class*=" bi-"] {
      color: var(--icon-color, var(--text, #FFFFFF));
    }
    
    /* Style spécifique pour les icônes dans les boutons */
    button i,
    .btn i {
      color: var(--icon-color, var(--text, #FFFFFF));
    }
    
    /* Masquer la scrollbar pour les catégories */
    #news-categories::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="d-none" id="news-page" style="min-height:100vh;">

  <!-- Barre des catégories (sticky) -->
  <div class="sticky-top" style="z-index:10;">
    <!-- Ligne titre + toggle -->
    <div class="d-flex align-items-center justify-content-between px-3 pt-3 pb-2">
      <span style="font-size:16px;font-weight:700;letter-spacing:0.3px;">Actualités</span>
      <button id="news-toggle-btn" type="button"
        style="border-radius:8px;padding:6px 10px;line-height:1;">
        <i class="bi bi-grid" id="news-toggle-icon"></i>
      </button>
    </div>
    <!-- Scroll catégories -->
    <div id="news-categories"
      class="d-flex gap-2 px-3 pb-3"
      style="overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;">
    </div>
  </div>

  <!-- Liste des news -->
  <div id="news-list"></div>

</body>
</html>
