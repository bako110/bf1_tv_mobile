<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications – BF1 TV</title>
  <meta name="description" content="Notifications BF1 TV : restez alerté des dernières actualités, émissions et programmes de la chaîne."/>
  <meta name="author" content="BF1 TV"/>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  
  <!-- Scripts -->
  <script src="../js/navbar-active.js"></script>
  
  <style>
    .notif-page-item {
      display: flex;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border, #1a1a1a);
      cursor: pointer;
      transition: background .15s;
    }
    .notif-page-item:hover { background: var(--bg-2, #111); }
    .notif-page-item.unread { background: rgba(226,62,62,0.05); }
    .notif-page-item.unread:hover { background: rgba(226,62,62,0.08); }
    .notif-page-icon {
      flex-shrink: 0;
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .notif-page-icon.unread { background: var(--red, #E23E3E); color: #fff; }
    .notif-page-icon.read { background: var(--bg-3, #1a1a1a); color: #555; }
    .notif-page-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
    .notif-page-title {
      font-size: 14px; font-weight: 600;
      color: var(--text-1, #fff);
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    .notif-page-title.read { font-weight: 400; color: var(--text-2, #aaa); }
    .notif-page-msg {
      font-size: 13px; color: var(--text-3, #666);
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      line-height: 1.4;
    }
    .notif-page-time { font-size: 11px; color: var(--text-3, #555); flex-shrink: 0; }
    .notif-del-btn {
      flex-shrink: 0; background: none; border: none;
      color: var(--text-3, #333); cursor: pointer;
      padding: 6px; font-size: 14px; align-self: center;
      border-radius: 6px; transition: color .15s, background .15s;
    }
    .notif-del-btn:hover { color: var(--red, #E23E3E); background: var(--red-soft); }
    .notif-actions-bar {
      display: flex; gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border, #222);
    }
    .notif-action-btn {
      font-size: 13px; padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border, #222);
      background: var(--bg-2, #111);
      color: var(--text-2, #aaa);
      cursor: pointer; transition: all .15s;
    }
    .notif-action-btn:hover { border-color: var(--red, #E23E3E); color: var(--red, #E23E3E); }
    .notif-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-3, #555);
    }
    .notif-empty i { font-size: 56px; display: block; margin-bottom: 16px; }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<main class="main-content">
  <div class="page-header" style="padding-top:100px;padding-bottom:16px;">
    <h1 class="page-header-title">Notifications</h1>
    <p class="page-header-sub" id="notif-unread-label">Chargement...</p>
  </div>

  <div class="container-fluid" style="max-width:800px;margin:0 auto;padding:0 16px 60px;">
    <!-- Barre d'actions -->
    <div class="notif-actions-bar" id="notif-actions-bar" style="display:none;">
      <button class="notif-action-btn" id="btn-mark-all">Tout marquer comme lu</button>
      <button class="notif-action-btn" id="btn-delete-all">Tout supprimer</button>
    </div>
    <!-- liste -->
    <div id="notif-list"></div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  const [headerHtml, footerHtml] = await Promise.all([
    fetch('../partials/header.html').then(r => r.text()),
    fetch('../partials/footer.html').then(r => r.text())
  ]);
  document.getElementById('header-placeholder').innerHTML = headerHtml;
  document.getElementById('footer-placeholder').innerHTML = footerHtml;

  // Menu mobile
  const initMobileMenu = () => {
    const hamburger = document.querySelector('.navbar-hamburger');
    const navLinks = document.querySelector('.navbar-links');
    if (hamburger && navLinks) {
      const newH = hamburger.cloneNode(true);
      hamburger.parentNode.replaceChild(newH, hamburger);
      const newN = navLinks.cloneNode(true);
      navLinks.parentNode.replaceChild(newN, navLinks);
      const fH = document.querySelector('.navbar-hamburger');
      const fN = document.querySelector('.navbar-links');
      fH.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        this.classList.toggle('open');
        fN.classList.toggle('open');
        document.body.style.overflow = fN.classList.contains('open') ? 'hidden' : '';
      });
      fN.querySelectorAll('a').forEach(l => l.addEventListener('click', () => {
        fH.classList.remove('open'); fN.classList.remove('open'); document.body.style.overflow = '';
      }));
      document.addEventListener('click', (e) => {
        if (!fH.contains(e.target) && !fN.contains(e.target)) {
          fH.classList.remove('open'); fN.classList.remove('open'); document.body.style.overflow = '';
        }
      });
    } else { setTimeout(initMobileMenu, 100); }
  };
  setTimeout(initMobileMenu, 100);

  // Charger les notifications
  import('../js/notifications-page.js').then(m => m.loadNotificationsPage());
</script>
  <script type="module" src="../js/theme.js"></script>
</body>
</html>
