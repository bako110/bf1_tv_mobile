<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <!-- Base -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Title -->
  <title>Détail — BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Découvrez le détail complet du contenu sur BF1 TV : flashinfo, émissions ou reels avec toutes les informations et options de streaming disponibles.">

  <!-- Open Graph (Facebook, WhatsApp, etc.) -->
  <meta property="og:title" content="BF1 TV - Détail du contenu">
  <meta property="og:description" content="Consultez le détail du contenu sur BF1 TV et profitez d’une expérience de streaming simple et rapide.">
  <meta property="og:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">
  <meta property="og:url" content="https://tonsite.com/detail">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BF1 TV - Détail du contenu">
  <meta name="twitter:description" content="Flashinfo, émissions et reels sur BF1 TV avec toutes les informations et options de streaming.">
  <meta name="twitter:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>

  <!-- CSS (libs) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- CSS (custom) -->
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/detail-contenu.css"/>
</head>
<body>

<div id="header-placeholder"></div>


<main class="main-content">
  <div id="detail-container" class="detail-container">
    <div class="text-center py-5">
      <div class="spinner-border text-danger" role="status">
        <span class="visually-hidden">Chargement...</span>
      </div>
      <p class="mt-3 text-secondary">Chargement du contenu...</p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  // Injection header/footer
  const [headerHtml, footerHtml] = await Promise.all([
    fetch('../partials/header.html').then(r => r.text()),
    fetch('../partials/footer.html').then(r => r.text())
  ]);
  document.getElementById('header-placeholder').innerHTML = headerHtml;
  document.getElementById('footer-placeholder').innerHTML = footerHtml;

  // ===== INITIALISATION DU MENU MOBILE =====
  const initMobileMenu = () => {
    const hamburger = document.querySelector('.navbar-hamburger');
    const navLinks = document.querySelector('.navbar-links');
    if (hamburger && navLinks) {
      // Supprimer les anciens événements en clonant
      const newHamburger = hamburger.cloneNode(true);
      hamburger.parentNode.replaceChild(newHamburger, hamburger);
      const newNavLinks = navLinks.cloneNode(true);
      navLinks.parentNode.replaceChild(newNavLinks, navLinks);
      const finalHamburger = document.querySelector('.navbar-hamburger');
      const finalNavLinks = document.querySelector('.navbar-links');
      finalHamburger.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.toggle('open');
        finalNavLinks.classList.toggle('open');
        if (finalNavLinks.classList.contains('open')) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
      });
      finalNavLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
      document.addEventListener('click', (e) => {
        if (!finalHamburger.contains(e.target) && !finalNavLinks.contains(e.target)) {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        }
      });
    } else {
      setTimeout(initMobileMenu, 100);
    }
  };
  setTimeout(initMobileMenu, 100);

  // Charger le JS spécifique à la page
  import('../js/detail-contenu.js');
</script>
</body>
</html>
