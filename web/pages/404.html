<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page introuvable – BF1 TV</title>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--bg-primary, #0a0a0a);
    }
    .page-404__code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #e8222a, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .page-404__icon {
      font-size: 3rem;
      color: var(--text-secondary, #888);
      margin-bottom: 1rem;
    }
    .page-404__title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary, #fff);
      margin-bottom: 0.75rem;
    }
    .page-404__desc {
      color: var(--text-secondary, #888);
      font-size: 1rem;
      max-width: 400px;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .page-404__actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: #e8222a;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-home:hover { background: #c41c23; color: #fff; }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: transparent;
      color: var(--text-primary, #fff);
      border: 1px solid var(--border, #333);
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-back:hover { border-color: #e8222a; color: #e8222a; }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="page-404">
    <div class="page-404__code">404</div>
    <div class="page-404__icon"><i class="bi bi-film"></i></div>
    <div class="page-404__title">Page introuvable</div>
    <div class="page-404__desc">
      La page que vous cherchez n'existe pas ou a été déplacée.
    </div>
    <div class="page-404__actions">
      <a href="/pages/accueil.html" class="btn-home">
        <i class="bi bi-house-fill"></i> Accueil
      </a>
      <a href="javascript:history.back()" class="btn-back">
        <i class="bi bi-arrow-left"></i> Retour
      </a>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    // Charger header/footer si disponibles
    async function loadComponent(id, path) {
      try {
        const res = await fetch(path);
        if (res.ok) document.getElementById(id).innerHTML = await res.text();
      } catch (_) {}
    }
    loadComponent('header-placeholder', '/components/header.html');
    loadComponent('footer-placeholder', '/components/footer.html');
  </script>
</body>
</html>
