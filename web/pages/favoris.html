<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>
  <title>Mes Favoris — BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Retrouvez vos contenus favoris sur BF1 TV : émissions, reportages et flashinfos sauvegardés."/>
  <meta name="author" content="BF1 TV"/>
  <meta name="robots" content="noindex, nofollow"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <script src="../js/navbar-active.js"></script>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main class="main-content">
  <div id="fav-container" class="fav-page-container">
    <!-- Contenu injecté par favoris.js -->
    <div class="fav-loader">
      <div class="spinner-border text-danger" role="status">
        <span class="visually-hidden">Chargement...</span>
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/favoris.js"></script>
<script type="module" src="../js/notifications.js"></script>
<script type="module" src="../js/ticker.js"></script>
<script type="module" src="../js/theme.js"></script>
</body>
</html>
