<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — BF1 TV</title>
  
  <!-- SEO -->
  <meta name="description" content="Connectez-vous à votre compte BF1 TV pour accéder à tous vos contenus préférés.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>
  
  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/connexion.css"/>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <!-- <img src="../logo.png" alt="BF1 TV" style="height: 60px;"> -->
        <!-- <p style="color: var(--text-3); margin-top: 0.5rem;">Votre télévision, partout avec vous</p> -->
      </div>
      
      <!-- Alert message -->
      <div id="alertMessage" class="alert-message">
        <i class="bi"></i>
        <span></span>
      </div>
      
      <!-- Tabs -->
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">
          <i class="bi bi-box-arrow-in-right"></i> Connexion
        </div>
        <div class="auth-tab" data-tab="register">
          <i class="bi bi-person-plus"></i> Inscription
        </div>
      </div>
      
      <!-- Formulaire de connexion -->
      <div id="loginForm" class="auth-form active">
        <form id="loginFormElement">
          <div class="form-group">
            <label>Email ou nom d'utilisateur</label>
            <input type="text" id="loginIdentifier" placeholder="exemple@email.com" autocomplete="username">
            <div class="error-message" id="loginIdentifierError"></div>
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
            <div class="error-message" id="loginPasswordError"></div>
          </div>
          <div class="forgot-password">
            <a href="mot-de-passe-oublie.html">Mot de passe oublié ?</a>
          </div>
          <button type="submit" class="btn-auth" id="loginBtn">
            <i class="bi bi-box-arrow-in-right"></i>
            <span>Se connecter</span>
          </button>
        </form>
      </div>
      
      <!-- Formulaire d'inscription -->
      <div id="registerForm" class="auth-form">
        <form id="registerFormElement">
          <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="registerUsername" placeholder="johndoe" autocomplete="username">
            <div class="error-message" id="registerUsernameError"></div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="registerEmail" placeholder="exemple@email.com" autocomplete="email">
            <div class="error-message" id="registerEmailError"></div>
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password">
            <div class="error-message" id="registerPasswordError"></div>
          </div>
          <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" id="registerConfirmPassword" placeholder="••••••••" autocomplete="new-password">
            <div class="error-message" id="registerConfirmError"></div>
          </div>
          <button type="submit" class="btn-auth" id="registerBtn">
            <i class="bi bi-person-plus"></i>
            <span>S'inscrire</span>
          </button>
        </form>
      </div>
      
      <div class="auth-footer">
        <p id="footerText">Vous n'avez pas de compte ? <a href="#" id="switchToRegister">Inscrivez-vous</a></p>
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>

<script type="module" src="../js/connexion.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/notifications.js"></script>
  <script type="module" src="../js/ticker.js"></script>
</body>
</html>
