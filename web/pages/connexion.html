<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion – BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Connectez-vous à votre compte BF1 TV pour accéder à vos favoris, commentaires et contenus personnalisés."/>
  <meta name="author" content="BF1 TV"/>
  <meta name="robots" content="noindex, nofollow"/>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>
  
  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/connexion.css"/>
  
  <!-- Scripts -->
  <script src="../js/navbar-active.js"></script>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <!-- <img src="../logo.png" alt="BF1 TV" style="height: 60px;"> -->
        <!-- <p style="color: var(--text-3); margin-top: 0.5rem;">Votre télévision, partout avec vous</p> -->
      </div>
      
      <!-- Alert message -->
      <div id="alertMessage" class="alert-message">
        <i class="bi"></i>
        <span></span>
      </div>
      
      <!-- Tabs -->
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">
          <i class="bi bi-box-arrow-in-right"></i> Connexion
        </div>
        <div class="auth-tab" data-tab="register">
          <i class="bi bi-person-plus"></i> Inscription
        </div>
      </div>
      
      <!-- Formulaire de connexion -->
      <div id="loginForm" class="auth-form active">
        <form id="loginFormElement">
          <div class="form-group">
            <label>Email ou nom d'utilisateur</label>
            <input type="text" id="loginIdentifier" placeholder="exemple@email.com" autocomplete="username">
            <div class="error-message" id="loginIdentifierError"></div>
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
            <div class="error-message" id="loginPasswordError"></div>
          </div>
          <div class="forgot-password">
            <a href="mot-de-passe-oublie.html">Mot de passe oublié ?</a>
          </div>
          <button type="submit" class="btn-auth" id="loginBtn">
            <i class="bi bi-box-arrow-in-right"></i>
            <span>Se connecter</span>
          </button>
        </form>
      </div>
      
      <!-- Formulaire d'inscription -->
      <div id="registerForm" class="auth-form">
        <form id="registerFormElement">
          <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="registerUsername" placeholder="johndoe" autocomplete="username">
            <div class="error-message" id="registerUsernameError"></div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="registerEmail" placeholder="exemple@email.com" autocomplete="email">
            <div class="error-message" id="registerEmailError"></div>
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password">
            <div class="error-message" id="registerPasswordError"></div>
          </div>
          <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" id="registerConfirmPassword" placeholder="••••••••" autocomplete="new-password">
            <div class="error-message" id="registerConfirmError"></div>
          </div>
          <button type="submit" class="btn-auth" id="registerBtn">
            <i class="bi bi-person-plus"></i>
            <span>S'inscrire</span>
          </button>
        </form>
      </div>
      
      <!-- Connexion sociale : Google uniquement -->
      <div class="auth-social">
        <div class="auth-divider"><span>Ou continuer avec</span></div>
        <div class="social-btns">
          <button class="btn-social btn-google" id="googleLoginBtn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Google</span>
          </button>
        </div>
      </div>

      <div class="auth-footer">
        <p id="footerText">Vous n'avez pas de compte ? <a href="#" id="switchToRegister">Inscrivez-vous</a></p>
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>

<script type="module" src="../js/connexion.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/notifications.js"></script>
  <script type="module" src="../js/ticker.js"></script>
  <script type="module" src="../js/theme.js"></script>
</body>
</html>
