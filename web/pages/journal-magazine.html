<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <!-- Base -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Title -->
  <title>Journal et Magazine — BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Consultez le journal et magazine sur BF1 TV : flashinfo, reels et contenus variés disponibles à tout moment pour une expérience simple et rapide.">

  <!-- Open Graph (Facebook, WhatsApp, etc.) -->
  <meta property="og:title" content="BF1 TV - Journal, Magazine et Flashinfo">
  <meta property="og:description" content="Restez informé avec le journal et magazine sur BF1 TV : flashinfo, reels et contenus variés accessibles facilement.">
  <meta property="og:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">
  <meta property="og:url" content="https://tonsite.com/journal-magazine">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BF1 TV - Journal, Magazine et Flashinfo">
  <meta name="twitter:description" content="Flashinfo, journal et magazine sur BF1 TV pour profiter d’une expérience complète de streaming et d’actualités.">
  <meta name="twitter:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>

  <!-- CSS (libs) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- CSS (custom) -->
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/pagination.css"/>
  <link rel="stylesheet" href="../styles/journal-magazine.css"/>
</head>
<body>

<div id="header-placeholder"></div>
<main class="main-content">
  <div class="page-header">
    <h1 class="page-header-title"><i class="bi bi-journal-text" style="color:var(--red)"></i> Journal et Magazine</h1>
    <p class="page-header-sub">Journaux télévisés et magazines d'information</p>
  </div>
  <div class="flash-layout">
    <div>
      <div class="filter-pills mb-4">
        <!-- Filtres générés dynamiquement -->
      </div>
      <!-- News chargées dynamiquement depuis le backend -->
    </div>
    <div>
      <div class="section-title mb-3"><i class="bi bi-fire"></i>Éditions Populaires</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <!-- Tendances générées dynamiquement -->
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  // Injection header/footer
  const [headerHtml, footerHtml] = await Promise.all([
    fetch('../partials/header.html').then(r => r.text()),
    fetch('../partials/footer.html').then(r => r.text())
  ]);
  document.getElementById('header-placeholder').innerHTML = headerHtml;
  document.getElementById('footer-placeholder').innerHTML = footerHtml;

  // ===== INITIALISATION DU MENU MOBILE =====
  const initMobileMenu = () => {
    const hamburger = document.querySelector('.navbar-hamburger');
    const navLinks = document.querySelector('.navbar-links');
    if (hamburger && navLinks) {
      // Supprimer les anciens événements en clonant
      const newHamburger = hamburger.cloneNode(true);
      hamburger.parentNode.replaceChild(newHamburger, hamburger);
      const newNavLinks = navLinks.cloneNode(true);
      navLinks.parentNode.replaceChild(newNavLinks, navLinks);
      const finalHamburger = document.querySelector('.navbar-hamburger');
      const finalNavLinks = document.querySelector('.navbar-links');
      finalHamburger.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.toggle('open');
        finalNavLinks.classList.toggle('open');
        if (finalNavLinks.classList.contains('open')) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
      });
      finalNavLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
      document.addEventListener('click', (e) => {
        if (!finalHamburger.contains(e.target) && !finalNavLinks.contains(e.target)) {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        }
      });
    } else {
      setTimeout(initMobileMenu, 100);
    }
  };
  setTimeout(initMobileMenu, 100);

  // Charger le JS spécifique à la page
  import('../js/journal-magazine.js').then(module => {
    module.loadJournalMagazineContent();
  });
</script>
  <script type="module" src="../js/notifications.js"></script>
  <script type="module" src="../js/ticker.js"></script>
</body>
</html>
