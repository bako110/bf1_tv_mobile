<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>
  <title>Archive — BF1 TV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/pagination.css"/>
  <link rel="stylesheet" href="../styles/archive.css"/>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-header-title"><i class="bi bi-archive-fill" style="color:var(--red)"></i> Archive</h1>
    <p class="page-header-sub">Redécouvrez l'histoire du Burkina Faso et de l'Afrique</p>
  </div>
  <div class="flash-layout">
    <div>
      <div class="filter-pills mb-4">
        <!-- Filtres générés dynamiquement -->
      </div>
      <!-- News chargées dynamiquement depuis le backend -->
    </div>
    <div>
      <div class="section-title mb-3"><i class="bi bi-fire"></i>Archives Populaires</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <!-- Tendances générées dynamiquement -->
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../app.js"></script>
<script type="module">
  import { loadArchiveContent } from '../js/archive.js';
  
  // Charger le contenu archive au chargement de la page
  document.addEventListener('DOMContentLoaded', () => {
    loadArchiveContent();
  });
</script>
</body>
</html>
