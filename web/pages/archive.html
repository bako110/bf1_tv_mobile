<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <!-- Base -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Title -->
  <title>Archive — BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Découvrez les archives de BF1 TV : émissions, flashinfo, reels et contenus passés disponibles à tout moment. Profitez d’un accès simple et rapide à vos contenus préférés en streaming.">

  <!-- Open Graph (Facebook, WhatsApp, etc.) -->
  <meta property="og:title" content="BF1 TV - Archives et contenus passés">
  <meta property="og:description" content="Regardez les archives de BF1 TV : émissions, flashinfo, films et reels disponibles à tout moment. Une plateforme simple, rapide et accessible partout.">
  <meta property="og:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">
  <meta property="og:url" content="https://tonsite.com/archive">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BF1 TV - Archives et divertissement">
  <meta name="twitter:description" content="Films, émissions, flashinfo et reels disponibles dans les archives de BF1 TV.">
  <meta name="twitter:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>

  <!-- CSS (libs) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- CSS (custom) -->
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/archive.css"/>
  <link rel="stylesheet" href="../styles/pagination.css"/>
</head>
<body>

<div id="header-placeholder"></div>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-header-title"><i class="bi bi-archive-fill" style="color:var(--red)"></i> Archive</h1>
    <p class="page-header-sub">Redécouvrez l'histoire du Burkina Faso et de l'Afrique</p>
  </div>
  <div class="flash-layout">
    <div>
      <div class="filter-pills mb-4">
        <!-- Filtres générés dynamiquement -->
      </div>
      <!-- News chargées dynamiquement depuis le backend -->
    </div>
    <div>
      <div class="section-title mb-3"><i class="bi bi-fire"></i>Archives Populaires</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <!-- Tendances générées dynamiquement -->
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  console.log('🚀 Début du chargement de la page Archive...');
  
  // Charger le header et le footer
  const [headerHtml, footerHtml] = await Promise.all([
    fetch('../partials/header.html').then(r => r.text()),
    fetch('../partials/footer.html').then(r => r.text())
  ]);
  
  document.getElementById('header-placeholder').innerHTML = headerHtml;
  document.getElementById('footer-placeholder').innerHTML = footerHtml;
  
  console.log('✅ Header et footer chargés');
  
  // ===== INITIALISATION DU MENU MOBILE =====
  // Attendre que le header soit injecté dans le DOM
  const initMobileMenu = () => {
    const hamburger = document.querySelector('.navbar-hamburger');
    const navLinks = document.querySelector('.navbar-links');
    
    if (hamburger && navLinks) {
      console.log('✅ Menu trouvé, initialisation...');
      
      // Supprimer les anciens événements en clonant
      const newHamburger = hamburger.cloneNode(true);
      hamburger.parentNode.replaceChild(newHamburger, hamburger);
      
      const newNavLinks = navLinks.cloneNode(true);
      navLinks.parentNode.replaceChild(newNavLinks, navLinks);
      
      const finalHamburger = document.querySelector('.navbar-hamburger');
      const finalNavLinks = document.querySelector('.navbar-links');
      
      // Événement au clic
      finalHamburger.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        console.log('🔄 Clic sur le menu hamburger');
        this.classList.toggle('open');
        finalNavLinks.classList.toggle('open');
        
        if (finalNavLinks.classList.contains('open')) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
      });
      
      // Fermer en cliquant sur un lien
      finalNavLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
      
      // Fermer en cliquant en dehors
      document.addEventListener('click', (e) => {
        if (!finalHamburger.contains(e.target) && !finalNavLinks.contains(e.target)) {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        }
      });
      
      console.log('✅ Menu mobile initialisé avec succès');
    } else {
      console.log('⏳ En attente du menu...');
      setTimeout(initMobileMenu, 100);
    }
  };
  
  // Lancer l'initialisation du menu
  setTimeout(initMobileMenu, 100);
  
  // Charger le contenu archive
  import('../js/archive.js').then(module => {
    module.loadArchiveContent();
    console.log('✅ Contenu archive chargé');
  });
</script>
</body>
</html>
