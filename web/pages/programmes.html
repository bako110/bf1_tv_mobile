<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <!-- Base -->
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Title -->
  <title>Programmes – BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Découvrez les programmes sur BF1 TV : flashinfo, émissions et reels disponibles pour un accès simple et rapide à vos contenus préférés.">

  <!-- Open Graph (Facebook, WhatsApp, etc.) -->
  <meta property="og:title" content="BF1 TV - Programmes et Flashinfo">
  <meta property="og:description" content="Suivez les programmes sur BF1 TV avec flashinfo, émissions et reels. Accès facile et rapide aux contenus.">
  <meta property="og:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">
  <meta property="og:url" content="https://tonsite.com/programmes">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BF1 TV - Programmes et Flashinfo">
  <meta name="twitter:description" content="Flashinfo, émissions et reels sur BF1 TV pour profiter d'une expérience complète de programmes.">
  <meta name="twitter:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>

  <!-- CSS (libs) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- CSS (custom) -->
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/hero.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/direct.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  
  <!-- Scripts -->
  <script src="../js/navbar-active.js"></script>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-header-title">Grille des Programmes</h1>
    <p class="page-header-sub">Découvrez toute la programmation BF1, jour par jour</p>
    <!-- <div class="page-header-tags">
      <span class="ptag ptag-live"><i class="bi bi-record-circle"></i>Directs</span>
      <span class="ptag ptag-premiere"><i class="bi bi-star-fill"></i>Première</span>
      <span class="ptag ptag-event"><i class="bi bi-calendar-event-fill"></i>Événements</span>
    </div> -->
  </div>
  <div class="container-fluid">
    <div class="filter-bar mb-4">
      <div class="filter-bar-row1">
        <div class="filter-select-wrap">
          <label><i class="bi bi-calendar3"></i>Jour</label>
          <select class="filter-select" id="dayFilter">
            <option value="today">Aujourd'hui</option>
            <option value="tomorrow">Demain</option>
          <option value="after-tomorrow">Après-demain</option>
          </select>
          <i class="bi bi-chevron-down filter-select-arrow"></i>
        </div>
        <div class="filter-select-wrap">
          <label><i class="bi bi-clock"></i>Horaire</label>
          <select class="filter-select" id="timeFilter">
            <option value="all">Tous</option>
            <option value="morning">Matin</option>
            <option value="afternoon">Après-midi</option>
            <option value="evening">Soirée</option>
          </select>
          <i class="bi bi-chevron-down filter-select-arrow"></i>
        </div>
      </div>
      <!-- La ligne des filtres (Tendances, Populaires, etc.) a Ã©tÃ© supprimÃ©e -->
    </div>
    <div class="day-selector mb-4" id="daySelector">
      <!-- Les jours seront générés dynamiquement -->
    </div>
  </div>
  <div class="programme-layout">
    <div id="programsList">
      <!-- Programmes chargés dynamiquement -->
      <div class="text-center py-5">
        <div class="spinner-border text-danger" role="status">
          <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="mt-3">Chargement des programmes...</p>
      </div>
    </div>
    <div id="featuredProgram">
      <div class="ala-une-card">
        <div class="ala-une-header"><i class="bi bi-star-fill"></i>À LA UNE</div>
        <div class="ala-une-thumb" id="featuredContent">
          <div class="text-center p-5">
            <div class="spinner-border text-danger"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../app.js"></script>
<script type="module">
 import { ProgrammesService } from '../js/programme.js';
  
  document.addEventListener('DOMContentLoaded', () => {
    const programmesService = new ProgrammesService();
    programmesService.init();
  });
</script>
  <script type="module" src="../js/notifications.js"></script>
  <script type="module" src="../js/ticker.js"></script>
  <script type="module" src="../js/theme.js"></script>
</body>
</html>
