<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Détail Actualité — BF1 TV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/news-detail.css"/>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>
<main class="main-content">
  <div class="container">
    <a href="flashinfo.html" class="back-button">
      <i class="bi bi-arrow-left"></i>
      Retour 
    </a>

    <div id="newsDetailContainer">
      <!-- Skeleton loader -->
      <div class="news-detail-hero skeleton" style="height: 500px;"></div>
      <div class="news-detail-content">
        <div class="skeleton" style="height: 30px; width: 60%; margin-bottom: 1rem;"></div>
        <div class="skeleton" style="height: 20px; width: 100%; margin-bottom: 0.5rem;"></div>
        <div class="skeleton" style="height: 20px; width: 100%; margin-bottom: 0.5rem;"></div>
        <div class="skeleton" style="height: 20px; width: 80%;"></div>
      </div>
    </div>

    <div class="related-news">
      <h2 class="section-title mb-4"><i class="bi bi-newspaper"></i> Articles similaires</h2>
      <div id="relatedNewsContainer" class="related-news-scroll">
        <!-- Articles similaires chargés dynamiquement -->
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../app.js"></script>
<script type="module">
  import { loadNewsDetail } from '../js/news-detail.js';
  
  document.addEventListener('DOMContentLoaded', () => {
    loadNewsDetail();
  });
</script>
</body>
</html>
