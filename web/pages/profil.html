<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>
  <title>Profil — BF1 TV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main class="main-content">
  <div class="profile-layout">
    <div class="profile-card anim-up">
      <div class="profile-avatar">
        <!-- L'avatar sera généré dynamiquement par JavaScript -->
        <i class="bi bi-person-fill"></i>
      </div>
      <div class="profile-name">
        <!-- Nom utilisateur chargé dynamiquement -->
        Chargement...
      </div>
      <div class="profile-email">
        <!-- Email chargé dynamiquement -->
        Chargement...
      </div>
      <div class="plan-card mt-4 text-start">
        <div class="plan-card-title">
          <i class="bi bi-star-fill" style="color:#f5a623"></i>Mon Abonnement
        </div>
        <div class="plan-type">
          <i class="bi bi-gift-fill"></i> Chargement...
        </div>
        <div class="plan-desc">
          Chargement des informations...
        </div>
        <div class="plan-feature">
          <i class="bi bi-check-lg yes"></i>Contenu gratuit illimité
        </div>
        <div class="plan-feature">
          <i class="bi bi-x-lg no"></i>Accès au contenu premium
        </div>
        <div class="plan-feature">
          <i class="bi bi-x-lg no"></i>Qualité HD/4K
        </div>
        <button class="btn-red w-100 justify-content-center mt-3" style="display: none;">
          <i class="bi bi-arrow-up-circle-fill"></i>Passer à Premium
        </button>
      </div>
      <!-- <div class="profile-stats mt-4">
        <div class="profile-stat">
          <div class="profile-stat-num">0</div>
          <div class="profile-stat-lbl">Favoris</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">0</div>
          <div class="profile-stat-lbl">Commentaires</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">0</div>
          <div class="profile-stat-lbl">Likes</div>
        </div>
      </div> -->
    </div>
    <div class="mt-2">
      <div class="profile-menu-item anim-up d1" id="favoritesBtn">
        <div class="profile-menu-icon"><i class="bi bi-heart-fill"></i></div>
        <div class="profile-menu-text">Mes Favoris</div>
        <i class="bi bi-chevron-right profile-menu-arrow"></i>
      </div>
      <div class="profile-menu-item anim-up d2">
        <div class="profile-menu-icon"><i class="bi bi-bell-fill"></i></div>
        <div class="profile-menu-text">Notifications</div>
        <i class="bi bi-chevron-right profile-menu-arrow"></i>
      </div>
      <div class="profile-menu-item anim-up d3">
        <div class="profile-menu-icon"><i class="bi bi-question-circle-fill"></i></div>
        <div class="profile-menu-text">Aide & Support</div>
        <i class="bi bi-chevron-right profile-menu-arrow"></i>
      </div>
      <div class="profile-menu-item anim-up d4">
        <div class="profile-menu-icon"><i class="bi bi-info-circle-fill"></i></div>
        <div class="profile-menu-text">À propos</div>
        <i class="bi bi-chevron-right profile-menu-arrow"></i>
      </div>
      <div class="profile-menu-item anim-up d5">
        <div class="profile-menu-icon"><i class="bi bi-file-text-fill"></i></div>
        <div class="profile-menu-text">Conditions d'utilisation</div>
        <i class="bi bi-chevron-right profile-menu-arrow"></i>
      </div>
      <div class="profile-menu-item danger anim-up d6">
        <div class="profile-menu-icon" style="background:rgba(232,34,42,0.1)">
          <i class="bi bi-box-arrow-right"></i>
        </div>
        <div class="profile-menu-text">Déconnexion</div>
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/profil.js"></script>
  <script type="module" src="../js/notifications.js"></script>
  <script type="module" src="../js/ticker.js"></script>
  <script type="module" src="../js/theme.js"></script>
</body>
</html>
