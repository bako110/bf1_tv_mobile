<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  const [h, f] = await Promise.all([
    fetch('../partials/header.html').then(r => r.text()),
    fetch('../partials/footer.html').then(r => r.text())
  ]);
  document.getElementById('header-placeholder').innerHTML = h;
  document.getElementById('footer-placeholder').innerHTML = f;

  const { loadAbonnement } = await import('../js/abonnement.js');
  await loadAbonnement();
</script>
<script type="module" src="../js/notifications.js"></script>
<script type="module" src="../js/ticker.js"></script>
