<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem('bf1_theme')||'dark';document.documentElement.setAttribute('data-theme',t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abonnement — BF1 TV</title>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/abonnement.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <!-- Scripts -->
  <script src="../js/navbar-active.js"></script>
</head>
<body>

<div id="header-placeholder"></div>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-header-title"><i class="bi bi-star-fill" style="color:var(--red)"></i> Abonnement Premium</h1>
    <p class="page-header-sub">Accédez à tous les contenus exclusifs BF1 TV</p>
  </div>
  <div id="plans-container" class="container py-4">
    <div class="text-center py-5">
      <div class="spinner-border text-danger" role="status"></div>
      <p class="mt-3" style="color:var(--text-2)">Chargement des offres...</p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  const [h, f] = await Promise.all([
    fetch('../partials/header.html').then(r => r.text()),
    fetch('../partials/footer.html').then(r => r.text())
  ]);
  document.getElementById('header-placeholder').innerHTML = h;
  document.getElementById('footer-placeholder').innerHTML = f;

  const { loadAbonnement } = await import('../js/abonnement.js');
  await loadAbonnement();
</script>
<script type="module" src="../js/notifications.js"></script>
<script type="module" src="../js/ticker.js"></script>
<script type="module" src="../js/theme.js"></script>
</body>
</html>
