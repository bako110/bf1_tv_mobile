<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>
  <title>Films — BF1 TV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/films.css"/>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
    setTimeout(() => {
      document.querySelectorAll('.nav-link').forEach(link => {
        if (link.getAttribute('href') === 'films.html') {
          link.classList.add('active');
        }
      });
    }, 100);
  });
</script>

<main class="main-content">
  <!-- Hero Section -->
  <div class="container-fluid pt-5 pb-2">
    <div class="films-hero anim-up">
      <div class="films-hero-tag"><i class="bi bi-film me-1"></i>CATALOGUE</div>
      <div class="films-hero-title">Films BF1</div>
      <div class="films-hero-sub">Découvrez notre sélection de films africains et internationaux</div>
      <div class="films-hero-stats">
        <div class="films-stat-box"><div class="films-stat-num" id="totalFilms">--</div><div class="films-stat-lbl">Films</div></div>
        <div class="films-stat-box"><div class="films-stat-num" id="freeFilms">--</div><div class="films-stat-lbl">Gratuits</div></div>
        <div class="films-stat-box"><div class="films-stat-num" id="premiumFilms">--</div><div class="films-stat-lbl">Premium</div></div>
      </div>
    </div>
  </div>

  <!-- Search & Filters -->
  <div class="container-fluid py-3">
    <div class="search-bar-full">
      <div class="search-bar-input-wrap">
        <i class="bi bi-search"></i>
        <input type="text" class="search-bar-input" placeholder="Rechercher un film..."/>
      </div>
      <select class="search-bar-select genre-select">
        <option value="all">Tous les genres</option>
      </select>
      <select class="search-bar-select year-select">
        <option value="all">Toutes les années</option>
      </select>
      <button class="btn-red"><i class="bi bi-funnel-fill"></i>Filtrer</button>
    </div>
  </div>

  <!-- Filter Pills -->
  <div class="container-fluid">
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="trending"><i class="bi bi-fire"></i>Tendances</button>
      <button class="filter-pill" data-filter="recent"><i class="bi bi-clock"></i>Récents</button>
      <button class="filter-pill" data-filter="popular"><i class="bi bi-star"></i>Populaires</button>
      <button class="filter-pill" data-filter="rating"><i class="bi bi-star-fill"></i>Les mieux notés</button>
    </div>
  </div>

  <!-- Films Grid -->
  <div class="container-fluid py-4">
    <div class="section-head mb-3">
      <h3 class="section-title"><i class="bi bi-film"></i>Tous les films</h3>
    </div>
    <div class="films-grid">
      <div class="text-center py-5" style="grid-column: 1/-1;">
        <div class="spinner-border text-danger" role="status">
          <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="mt-3 text-secondary">Chargement des films...</p>
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/films.js"></script>
</body>
</html>
