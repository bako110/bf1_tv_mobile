<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Détail du Programme – BF1 TV</title>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/direct.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/program-detail.css"/>
  <script src="../js/navbar-active.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
  <script type="module" src="../js/ticker.js"></script>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main class="main-content">
  <div class="pd-wrap">

    <a href="programmes.html" class="pd-back">
      <i class="bi bi-arrow-left"></i> Retour aux programmes
    </a>

    <div id="pd-root">
      <div class="pd-loading">
        <div class="pd-loader"></div>
        <p>Chargement du programme…</p>
      </div>
    </div>

  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r=>r.text()).then(html=>{
    document.getElementById('footer-placeholder').innerHTML = html;
  }).catch(()=>{});
</script>

<script type="module">
  // Appel direct — évite tout problème de cache de module ES
  async function getProgramById(id) {
    const base = 'https://bf1.fly.dev/api/v1';
    const token = localStorage.getItem('bf1_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const r = await fetch(`${base}/programs/${id}`, { headers });
    if (!r.ok) { const e = new Error('Erreur API'); e.status = r.status; throw e; }
    return r.json();
  }

  const params   = new URLSearchParams(window.location.search);
  const programId = params.get('id');
  const root     = document.getElementById('pd-root');

  // ── helpers ────────────────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function parseUTC(isoStr) {
    // Gère "2026-03-30T08:30:00.000+00:00" ou "08:30:00" ou "08:30"
    if (!isoStr) return null;
    if (isoStr.includes('T')) return new Date(isoStr);
    // Format HH:MM ou HH:MM:SS  → on suppose aujourd'hui UTC
    const [h, m] = isoStr.split(':').map(Number);
    const d = new Date();
    d.setUTCHours(h, m || 0, 0, 0);
    return d;
  }

  function fmtTime(isoStr) {
    const d = parseUTC(isoStr);
    if (!d) return '--:--';
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' });
  }

  function fmtDate(isoStr) {
    const d = parseUTC(isoStr);
    if (!d) return '';
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'UTC' });
  }

  // ── countdown live ticker ──────────────────────────────────────────────────
  function startCountdown(targetDate, el) {
    function tick() {
      const diff = targetDate - Date.now();
      if (diff <= 0) { el.innerHTML = 'dans quelques instants…'; return; }
      const h  = Math.floor(diff / 3600000);
      const m  = Math.floor((diff % 3600000) / 60000);
      const s  = Math.floor((diff % 60000) / 1000);
      const parts = [];
      if (h) parts.push(`<span>${h}h</span>`);
      parts.push(`<span>${String(m).padStart(2,'0')}min</span>`);
      parts.push(`<span>${String(s).padStart(2,'0')}s</span>`);
      el.innerHTML = 'Dans ' + parts.join(' ');
      setTimeout(tick, 1000);
    }
    tick();
  }

  // ── live player ────────────────────────────────────────────────────────────
  function initPlayer(container) {
    const video = document.createElement('video');
    video.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    video.controls = false;
    video.autoplay = true;
    video.playsInline = true;
    video.muted = true;
    container.appendChild(video);

    // Contrôles : volume + plein écran
    const controls = document.createElement('div');
    controls.className = 'pd-player-controls';

    const volBtn = document.createElement('button');
    volBtn.className = 'pd-ctrl-btn';
    volBtn.innerHTML = '<i class="bi bi-volume-mute-fill"></i>';
    volBtn.title = 'Activer le son';
    volBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      volBtn.innerHTML = video.muted
        ? '<i class="bi bi-volume-mute-fill"></i>'
        : '<i class="bi bi-volume-up-fill"></i>';
      volBtn.title = video.muted ? 'Activer le son' : 'Couper le son';
    });

    const fsBtn = document.createElement('button');
    fsBtn.className = 'pd-ctrl-btn';
    fsBtn.innerHTML = '<i class="bi bi-fullscreen"></i>';
    fsBtn.title = 'Plein écran';
    fsBtn.addEventListener('click', () => {
      const el = container;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
        fsBtn.innerHTML = '<i class="bi bi-fullscreen-exit"></i>';
        fsBtn.title = 'Quitter le plein écran';
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
        fsBtn.innerHTML = '<i class="bi bi-fullscreen"></i>';
        fsBtn.title = 'Plein écran';
      }
    });
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        fsBtn.innerHTML = '<i class="bi bi-fullscreen"></i>';
        fsBtn.title = 'Plein écran';
      }
    });

    controls.appendChild(volBtn);
    controls.appendChild(fsBtn);
    container.appendChild(controls);

    const hlsUrl = 'https://bf1.fly.dev/api/v1/livestream/stream-proxy';

    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      const hls = new Hls({ enableWorker: true, autoStartLoad: true });
      hls.loadSource(hlsUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = hlsUrl;
      video.play().catch(() => {});
    } else {
      container.innerHTML = `
        <div class="pd-player-error">
          <i class="bi bi-exclamation-triangle-fill" style="font-size:2.5rem;color:#E23E3E"></i>
          <p>Lecture HLS non supportée par votre navigateur.</p>
          <a href="direct.html" class="btn-red" style="font-size:0.85rem;padding:8px 20px;text-decoration:none">
            <i class="bi bi-broadcast"></i> Ouvrir le direct
          </a>
        </div>`;
    }
  }

  // ── render ─────────────────────────────────────────────────────────────────
  function render(prog) {
    const now        = Date.now();
    const startDate  = parseUTC(prog.start_time);
    const endDate    = parseUTC(prog.end_time);
    const hasStarted = startDate && now >= startDate.getTime();
    const hasEnded   = endDate   && now > endDate.getTime();
    const isAiring   = hasStarted && !hasEnded;

    // Thumb commune
    const thumbSrc = prog.image_url ? esc(prog.image_url) : null;

    if (isAiring || prog.is_live) {
      // ════════════════════════════════════════
      // EN DIRECT — layout 2 colonnes
      // ════════════════════════════════════════
      root.innerHTML = `
        <div class="pd-live-layout">

          <!-- Gauche : player -->
          <div class="pd-player-col">
            <div class="pd-live-badge"><div class="pd-live-dot"></div>EN DIRECT</div>
            <div class="pd-player" id="pd-player"></div>
            <div style="font-size:0.8rem;color:#555;display:flex;align-items:center;gap:6px;">
              <i class="bi bi-info-circle"></i>
              Diffusion en cours · BF1 TV
            </div>
          </div>

          <!-- Droite : infos -->
          <div class="pd-info-col">
            ${thumbSrc
              ? `<div class="pd-info-thumb">
                   <img src="${thumbSrc}" alt="${esc(prog.title)}"/>
                   <div class="pd-info-thumb-overlay"></div>
                 </div>`
              : `<div class="pd-info-thumb pd-info-thumb-no-img" style="min-height:140px;">
                   <i class="bi bi-tv-fill"></i>
                 </div>`
            }
            <div class="pd-info-body">
              <div class="pd-info-title">${esc(prog.title)}</div>
              <div class="pd-info-meta">
                ${prog.channel_name ? `<div class="pd-info-meta-row"><i class="bi bi-tv-fill"></i>${esc(prog.channel_name)}</div>` : ''}
                <div class="pd-info-meta-row"><i class="bi bi-calendar3"></i>${fmtDate(prog.start_time)}</div>
                <div class="pd-info-meta-row">
                  <i class="bi bi-clock"></i>
                  ${fmtTime(prog.start_time)}${prog.end_time ? ' – ' + fmtTime(prog.end_time) : ''}
                </div>
                ${prog.category ? `<div class="pd-info-meta-row"><i class="bi bi-tag-fill"></i>${esc(prog.category)}</div>` : ''}
              </div>
              ${prog.description ? `<div class="pd-info-desc">${esc(prog.description)}</div>` : ''}
              <div class="pd-info-hint">
                <i class="bi bi-broadcast"></i>
                Ce programme est actuellement diffusé en direct.
                Cliquez sur <strong>🔇</strong> pour activer le son, sur <strong>⛶</strong> pour le plein écran.
              </div>
            </div>
          </div>

        </div>`;

      const playerEl = document.getElementById('pd-player');
      if (playerEl) initPlayer(playerEl);

    } else if (!hasStarted) {
      // ════════════════════════════════════════
      // À VENIR — centré
      // ════════════════════════════════════════
      root.innerHTML = `
        <div class="pd-center-layout">
          ${thumbSrc
            ? `<div class="pd-banner">
                 <img src="${thumbSrc}" alt="${esc(prog.title)}"/>
                 <div class="pd-banner-overlay"></div>
                 <div class="pd-banner-info">
                   <h1 class="pd-banner-title">${esc(prog.title)}</h1>
                   <div class="pd-banner-meta">
                     <span><i class="bi bi-calendar3"></i>${fmtDate(prog.start_time)}</span>
                     <span><i class="bi bi-clock"></i>${fmtTime(prog.start_time)}${prog.end_time ? ' – ' + fmtTime(prog.end_time) : ''}</span>
                     ${prog.channel_name ? `<span><i class="bi bi-tv-fill"></i>${esc(prog.channel_name)}</span>` : ''}
                   </div>
                 </div>
               </div>`
            : `<div style="padding:0 0 24px">
                 <h1 style="font-size:1.5rem;font-weight:800;text-transform:uppercase;">${esc(prog.title)}</h1>
                 <div style="color:#A0A0A0;font-size:0.85rem;display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;">
                   <span><i class="bi bi-calendar3"></i> ${fmtDate(prog.start_time)}</span>
                   <span><i class="bi bi-clock"></i> ${fmtTime(prog.start_time)}${prog.end_time ? ' – ' + fmtTime(prog.end_time) : ''}</span>
                   ${prog.channel_name ? `<span><i class="bi bi-tv-fill"></i> ${esc(prog.channel_name)}</span>` : ''}
                 </div>
               </div>`
          }
          <div class="pd-state-card">
            <div class="pd-state-icon"><i class="bi bi-clock-history"></i></div>
            <h2>Programme à venir</h2>
            <p>Ce programme n'a pas encore commencé.</p>
            <div class="pd-start-time">
              <i class="bi bi-broadcast"></i>
              ${fmtDate(prog.start_time)} à ${fmtTime(prog.start_time)}
            </div>
            <div class="pd-countdown" id="pd-countdown"></div>
            ${prog.description ? `<p style="margin-top:20px;font-size:0.88rem;color:#666;border-top:1px solid #1a1a1a;padding-top:16px;text-align:left;">${esc(prog.description)}</p>` : ''}
          </div>
        </div>`;

      if (startDate) {
        const cdEl = document.getElementById('pd-countdown');
        if (cdEl) startCountdown(startDate, cdEl);
      }

    } else {
      // ════════════════════════════════════════
      // TERMINÉ — centré
      // ════════════════════════════════════════
      root.innerHTML = `
        <div class="pd-center-layout">
          ${thumbSrc
            ? `<div class="pd-banner">
                 <img src="${thumbSrc}" alt="${esc(prog.title)}"/>
                 <div class="pd-banner-overlay"></div>
                 <div class="pd-banner-info">
                   <h1 class="pd-banner-title">${esc(prog.title)}</h1>
                   <div class="pd-banner-meta">
                     <span><i class="bi bi-calendar3"></i>${fmtDate(prog.start_time)}</span>
                     <span><i class="bi bi-clock"></i>${fmtTime(prog.start_time)}${prog.end_time ? ' – ' + fmtTime(prog.end_time) : ''}</span>
                   </div>
                 </div>
               </div>`
            : ''
          }
          <div class="pd-state-card ended">
            <div class="pd-state-icon"><i class="bi bi-check-circle-fill"></i></div>
            <h2>Programme terminé</h2>
            <p>Ce programme a été diffusé le ${fmtDate(prog.start_time)} à ${fmtTime(prog.start_time)}.</p>
            <a href="direct.html" class="btn-red" style="display:inline-flex;align-items:center;gap:8px;margin-top:20px;text-decoration:none;font-size:0.9rem;padding:10px 22px;border-radius:8px;">
              <i class="bi bi-broadcast"></i> Voir le direct maintenant
            </a>
          </div>
        </div>`;
    }
  }

  // ── bootstrap ──────────────────────────────────────────────────────────────
  if (!programId) {
    root.innerHTML = `
      <div class="pd-upcoming" style="text-align:center;padding:60px 20px;">
        <div class="pd-upcoming-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
        <h2>Programme introuvable</h2>
        <p>Aucun identifiant de programme fourni dans l'URL.</p>
        <a href="programmes.html" class="btn-red" style="display:inline-flex;align-items:center;gap:8px;margin-top:20px;text-decoration:none;font-size:0.9rem;padding:10px 22px;">
          <i class="bi bi-grid"></i> Voir tous les programmes
        </a>
      </div>`;
  } else {
    getProgramById(programId)
      .then(prog => {
        if (!prog) throw new Error('Programme non trouvé');
        render(prog);
      })
      .catch(err => {
        console.error(err);
        root.innerHTML = `
          <div class="pd-upcoming" style="text-align:center;padding:60px 20px;">
            <div class="pd-upcoming-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
            <h2>Erreur de chargement</h2>
            <p style="color:#A0A0A0">Impossible de charger ce programme. Vérifiez votre connexion.</p>
            <a href="programmes.html" class="btn-red" style="display:inline-flex;align-items:center;gap:8px;margin-top:20px;text-decoration:none;font-size:0.9rem;padding:10px 22px;">
              <i class="bi bi-grid"></i> Voir tous les programmes
            </a>
          </div>`;
      });
  }
</script>

</body>
</html>
