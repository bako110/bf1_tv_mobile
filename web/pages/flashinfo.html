<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <!-- Base -->
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Title -->
  <title>Flash Info – BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Flashinfos BF1 TV : l'actualité en temps réel. Restez connecté à La chaîne au cœur de nos défis.">

  <!-- Open Graph (Facebook, WhatsApp, etc.) -->
  <meta property="og:title" content="BF1 TV - Actualités en continu">
  <meta property="og:description" content="Suivez les flashinfos et l'actualité burkinabè en temps réel sur BF1 TV.">
  <meta property="og:image" content="https://bf1-tv-mobile.onrender.com/logo.png">
  <meta property="og:url" content="https://bf1-tv-mobile.onrender.com/pages/flashinfo.html">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BF1 TV - Flash Info en direct">
  <meta name="twitter:description" content="Les dernières actualités burkinabè et africaines sur BF1 TV.">
  <meta name="twitter:image" content="https://bf1-tv-mobile.onrender.com/logo.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>

  <!-- CSS (libs) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- CSS (custom) -->
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/pagination.css"/>
  
  <!-- Scripts -->
  <script src="../js/navbar-active.js"></script>
</head>
<body>

<div id="header-placeholder"></div>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-header-title"><i class="bi bi-lightning-fill" style="color:var(--red)"></i> Flash Info</h1>
    <p class="page-header-sub">L'actualité burkinabè et africaine en temps réel</p>
  </div>
  <div class="flash-layout">
    <div>
      <div class="filter-pills mb-4">
        <!-- Filtres générés dynamiquement -->
      </div>
      <!-- News chargées dynamiquement depuis le backend -->
    </div>
    <div>
      <div class="section-title mb-3"><i class="bi bi-fire"></i>Tendances</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <!-- Tendances générées dynamiquement -->
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  console.log('🚀 Début du chargement de la page Flash Info...');
  
  // Charger le header et le footer
  const [headerHtml, footerHtml] = await Promise.all([
    fetch('../partials/header.html').then(r => r.text()),
    fetch('../partials/footer.html').then(r => r.text())
  ]);
  
  document.getElementById('header-placeholder').innerHTML = headerHtml;
  document.getElementById('footer-placeholder').innerHTML = footerHtml;
  
  console.log('✅ Header et footer chargés');
  
  // ===== INITIALISATION DU MENU MOBILE =====
  // Attendre que le header soit injecté dans le DOM
  const initMobileMenu = () => {
    const hamburger = document.querySelector('.navbar-hamburger');
    const navLinks = document.querySelector('.navbar-links');
    
    if (hamburger && navLinks) {
      console.log('✅ Menu trouvé, initialisation...');
      
      // Supprimer les anciens événements en clonant
      const newHamburger = hamburger.cloneNode(true);
      hamburger.parentNode.replaceChild(newHamburger, hamburger);
      
      const newNavLinks = navLinks.cloneNode(true);
      navLinks.parentNode.replaceChild(newNavLinks, navLinks);
      
      const finalHamburger = document.querySelector('.navbar-hamburger');
      const finalNavLinks = document.querySelector('.navbar-links');
      
      // Événement au clic
      finalHamburger.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        console.log('🔔 Clic sur le menu hamburger');
        this.classList.toggle('open');
        finalNavLinks.classList.toggle('open');
        
        if (finalNavLinks.classList.contains('open')) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
      });
      
      // Fermer en cliquant sur un lien
      finalNavLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
      
      // Fermer en cliquant en dehors
      document.addEventListener('click', (e) => {
        if (!finalHamburger.contains(e.target) && !finalNavLinks.contains(e.target)) {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        }
      });
      
      console.log('✅ Menu mobile initialisé avec succès');
    } else {
      console.log('⏳ En attente du menu...');
      setTimeout(initMobileMenu, 100);
    }
  };
  
  // Lancer l'initialisation du menu
  setTimeout(initMobileMenu, 100);
  
  // Charger les flash infos
  import('../js/news.js').then(module => {
    module.loadFlashInfo();
    console.log('✅ Flash infos chargées');
  });
</script>
  <script type="module" src="../js/notifications.js"></script>
  <script type="module" src="../js/ticker.js"></script>
  <script type="module" src="../js/theme.js"></script>
</body>
</html>
