<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <!-- Base -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Title -->
  <title>Divertissement — BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Profitez du divertissement sur BF1 TV : flashinfo, émissions et reels disponibles à tout moment pour une expérience simple et rapide.">

  <!-- Open Graph (Facebook, WhatsApp, etc.) -->
  <meta property="og:title" content="BF1 TV - Divertissement et Flashinfo">
  <meta property="og:description" content="Suivez le divertissement sur BF1 TV : flashinfo, émissions et reels pour tous vos contenus préférés.">
  <meta property="og:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">
  <meta property="og:url" content="https://tonsite.com/divertissement">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BF1 TV - Divertissement et Flashinfo">
  <meta name="twitter:description" content="Flashinfo, émissions et reels disponibles sur BF1 TV pour une expérience de divertissement complète.">
  <meta name="twitter:image" content="https://res.cloudinary.com/dhamjjdf5/image/upload/v1774432549/logo_jtuhgd.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>

  <!-- CSS (libs) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- CSS (custom) -->
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/pagination.css"/>
  <link rel="stylesheet" href="../styles/divertissement.css"/>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main class="main-content">
  <div class="page-header">
    <h1 class="page-header-title"><i class="bi bi-emoji-smile-fill" style="color:var(--red)"></i> Divertissement</h1>
    <p class="page-header-sub">Émissions, spectacles et divertissement africain</p>
  </div>
  <div class="flash-layout">
    <div>
      <div class="filter-pills mb-4">
        <!-- Filtres générés dynamiquement -->
      </div>
      <!-- News chargées dynamiquement depuis le backend -->
    </div>
    <div>
      <div class="section-title mb-3"><i class="bi bi-fire"></i>Tendances Divertissement</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <!-- Tendances générées dynamiquement -->
      </div>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../app.js"></script>
<script type="module">
  import { loadDivertissementContent } from '../js/divertissement.js';
  
  // Charger le contenu divertissement au chargement de la page
  document.addEventListener('DOMContentLoaded', () => {
    loadDivertissementContent();
  });
</script>
</body>
</html>
