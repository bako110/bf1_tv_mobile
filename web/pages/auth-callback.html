<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion en cours… – BF1 TV</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <style>
    body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .cb-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      color: #fff;
      max-width: 380px;
      width: 90%;
    }
    .cb-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,.15);
      border-top-color: #4285F4;
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cb-title { font-size: 1.2rem; font-weight: 600; margin-bottom: .5rem; }
    .cb-sub { color: #888; font-size: .9rem; }
    .cb-error { color: #ef4444; margin-top: 1rem; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="cb-card">
    <div class="cb-spinner" id="spinner"></div>
    <p class="cb-title" id="cbTitle">Connexion en cours…</p>
    <p class="cb-sub" id="cbSub">Finalisation de votre connexion Google</p>
    <p class="cb-error" id="cbError" style="display:none;"></p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const userRaw = params.get('user');

      if (!token) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('cbTitle').textContent = 'Erreur de connexion';
        document.getElementById('cbSub').textContent = '';
        const errEl = document.getElementById('cbError');
        errEl.textContent = 'Token manquant. Veuillez réessayer.';
        errEl.style.display = 'block';
        setTimeout(() => { window.location.href = 'connexion.html'; }, 3000);
        return;
      }

      try {
        // Stocker le token BF1
        localStorage.setItem('bf1_token', token);

        if (userRaw) {
          try {
            const user = JSON.parse(decodeURIComponent(userRaw));
            localStorage.setItem('bf1_user', JSON.stringify(user));
          } catch (_) { /* ignore */ }
        }

        document.getElementById('cbTitle').textContent = 'Connexion réussie !';
        document.getElementById('cbSub').textContent = 'Redirection vers l\'accueil…';
        document.getElementById('spinner').style.borderTopColor = '#34A853';

        // Redirect selon la source (mobile ou web)
        const source = localStorage.getItem('oauth_source') || 'web';
        localStorage.removeItem('oauth_source');
        const dest = source === 'mobile'
          ? '/mobile/index.html#/profile'
          : 'accueil.html';
        setTimeout(() => { window.location.href = dest; }, 1200);

      } catch (e) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('cbTitle').textContent = 'Erreur';
        document.getElementById('cbSub').textContent = '';
        const errEl = document.getElementById('cbError');
        errEl.textContent = 'Une erreur est survenue. Redirection…';
        errEl.style.display = 'block';
        setTimeout(() => { window.location.href = 'connexion.html'; }, 3000);
      }
    })();
  </script>
</body>
</html>
