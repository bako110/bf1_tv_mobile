<body>
<div id="header-placeholder"></div>
<main class="main-content">
  <div class="page-header">
    <h1 class="page-header-title"><i class="bi bi-trophy-fill" style="color:var(--red)"></i> Sport</h1>
    <p class="page-header-sub">Toute l'actualite sportive burkinabe et africaine</p>
  </div>
  <div class="flash-layout">
    <div>
      <div class="filter-pills mb-4"></div>
      <div id="sportArticles"></div>
    </div>
    <div>
      <div class="section-title mb-3"><i class="bi bi-fire"></i> Tendances</div>
      <div style="display:flex;flex-direction:column;gap:12px"></div>
    </div>
  </div>
</main>
<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  const [h, f] = await Promise.all([
    fetch('../partials/header.html').then(r=>r.text()),
    fetch('../partials/footer.html').then(r=>r.text())
  ]);
  document.getElementById('header-placeholder').innerHTML = h;
  document.getElementById('footer-placeholder').innerHTML = f;
  const initMenu = () => {
    const hb = document.querySelector('.navbar-hamburger');
    const nl = document.querySelector('.navbar-links');
    if (hb && nl) {
      const nh = hb.cloneNode(true); hb.parentNode.replaceChild(nh, hb);
      const nn = nl.cloneNode(true); nl.parentNode.replaceChild(nn, nl);
      const fh = document.querySelector('.navbar-hamburger');
      const fn = document.querySelector('.navbar-links');
      fh.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); this.classList.toggle('open'); fn.classList.toggle('open'); document.body.style.overflow = fn.classList.contains('open') ? 'hidden' : ''; });
      fn.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { fh.classList.remove('open'); fn.classList.remove('open'); document.body.style.overflow = ''; }));
      document.addEventListener('click', e => { if (!fh.contains(e.target) && !fn.contains(e.target)) { fh.classList.remove('open'); fn.classList.remove('open'); document.body.style.overflow = ''; } });
    } else { setTimeout(initMenu, 100); }
  };
  setTimeout(initMenu, 100);
  import('../js/sport.js').then(m => m.loadSportContent());
</script>
  <script type="module" src="../js/notifications.js"></script>
  <script type="module" src="../js/ticker.js"></script>
  <script type="module" src="../js/theme.js"></script>
</body>
</html>
