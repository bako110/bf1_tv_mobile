  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    console.log('ðŸš€ DÃ©but du chargement...');
    
    // Charger le header et le footer
    const [headerHtml, footerHtml] = await Promise.all([
      fetch('../partials/header.html').then(r => r.text()),
      fetch('../partials/footer.html').then(r => r.text())
    ]);
    
    document.getElementById('header-placeholder').innerHTML = headerHtml;
    document.getElementById('footer-placeholder').innerHTML = footerHtml;
    
    console.log('✅ Header et footer chargés');
    
    // ===== INITIALISATION DU MENU MOBILE =====
    // Attendre que le header soit injecté dans le DOM
    const initMobileMenu = () => {
      const hamburger = document.querySelector('.navbar-hamburger');
      const navLinks = document.querySelector('.navbar-links');
      
      if (hamburger && navLinks) {
        console.log('✅ Menu trouvé, initialisation...');
        
        // Supprimer les anciens Ã©vÃ©nements en clonant
        const newHamburger = hamburger.cloneNode(true);
        hamburger.parentNode.replaceChild(newHamburger, hamburger);
        
        const newNavLinks = navLinks.cloneNode(true);
        navLinks.parentNode.replaceChild(newNavLinks, navLinks);
        
        const finalHamburger = document.querySelector('.navbar-hamburger');
        const finalNavLinks = document.querySelector('.navbar-links');
        
        // Événement au clic
        finalHamburger.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          console.log('ðŸ”„ Clic sur le menu hamburger');
          this.classList.toggle('open');
          finalNavLinks.classList.toggle('open');
          
          if (finalNavLinks.classList.contains('open')) {
            document.body.style.overflow = 'hidden';
          } else {
            document.body.style.overflow = '';
          }
        });
        
        // Fermer en cliquant sur un lien
        finalNavLinks.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            finalHamburger.classList.remove('open');
            finalNavLinks.classList.remove('open');
            document.body.style.overflow = '';
          });
        });
        
        // Fermer en cliquant en dehors
        document.addEventListener('click', (e) => {
          if (!finalHamburger.contains(e.target) && !finalNavLinks.contains(e.target)) {
            finalHamburger.classList.remove('open');
            finalNavLinks.classList.remove('open');
            document.body.style.overflow = '';
          }
        });
        
        console.log('✅ Menu mobile initialisé avec succès');
      } else {
        console.log('⏳ En attente du menu...');
        setTimeout(initMobileMenu, 100);
      }
    };
    
    // Lancer l'initialisation du menu
    setTimeout(initMobileMenu, 100);
    
    // Fonction pour charger le ticker
    async function startTicker() {
      try {
        const { loadTicker } = await import('../js/ticker.js');
        console.log('ðŸ“¡ ticker.js importÃ©');
        await loadTicker();
        setInterval(() => {
          console.log('📱 Rafraîchissement ticker...');
          loadTicker();
        }, 300000);
      } catch (error) {
        console.error('❌ Erreur import ticker:', error);
      }
    }
    
    // Attendre que le DOM soit mis à jour
    setTimeout(() => {
      const tickerTrack = document.querySelector('.ticker-track');
      if (tickerTrack) {
        console.log('✅ Ticker trouvé, démarrage...');
        startTicker();
      } else {
        console.log('⏳ Attente du ticker...');
        const observer = new MutationObserver((mutations, obs) => {
          const ticker = document.querySelector('.ticker-track');
          if (ticker) {
            obs.disconnect();
            console.log('✅ Ticker détecté via observer');
            startTicker();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
        
        setTimeout(() => {
          observer.disconnect();
          console.log('⚠️ Timeout: démarrage du ticker forcé');
          startTicker();
        }, 3000);
      }
    }, 200);
  </script>
