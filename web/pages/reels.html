<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reels — BF1 TV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/reels.css"/>
</head>
<body>

<div id="header-placeholder"></div>
<script>
  fetch('../partials/header.html').then(r => r.text()).then(html => {
    document.getElementById('header-placeholder').innerHTML = html;
  });
</script>

<main class="main-content">
  <div class="reels-player-container" id="reelsContainer">
    <div class="reels-loading">
      <div class="spinner-border text-danger" role="status">
        <span class="visually-hidden">Chargement...</span>
      </div>
      <p class="mt-3 text-secondary">Chargement des reels...</p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script>
  fetch('../partials/footer.html').then(r => r.text()).then(html => {
    document.getElementById('footer-placeholder').innerHTML = html;
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/reels.js"></script>
</body>
</html>
