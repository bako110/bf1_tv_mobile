<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <!-- Base -->
  <meta charset="UTF-8"/>
  <script>!function(){var t=localStorage.getItem("bf1_theme")||"dark";document.documentElement.setAttribute("data-theme",t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Title -->
  <title>Émissions — BF1 TV</title>

  <!-- SEO -->
  <meta name="description" content="Émissions BF1 TV : découvrez nos programmes originaux et reportages sur la vie burkinabè et africaine.">

  <!-- Open Graph (Facebook, WhatsApp, etc.) -->
  <meta property="og:title" content="BF1 TV - Nos programmes et émissions">
  <meta property="og:description" content="Regardez les émissions et reportages de BF1 TV. Une programmation riche pour suivre l'actualité locale et continentale.">
  <meta property="og:image" content="https://bf1-tv-mobile.onrender.com/logo.png">
  <meta property="og:url" content="https://bf1-tv-mobile.onrender.com/pages/emissions.html">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BF1 TV - Nos émissions">
  <meta name="twitter:description" content="Regardez les émissions et reportages de BF1 TV.">
  <meta name="twitter:image" content="https://bf1-tv-mobile.onrender.com/logo.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="shortcut icon" type="image/png" href="../logo.png"/>

  <!-- CSS (libs) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <!-- CSS (custom) -->
  <link rel="stylesheet" href="../styles/variables.css"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/navbar.css"/>
  <link rel="stylesheet" href="../styles/cards.css"/>
  <link rel="stylesheet" href="../styles/pages.css"/>
  <link rel="stylesheet" href="../styles/responsive.css"/>
  <link rel="stylesheet" href="../styles/emissions.css"/>
  
  <!-- Scripts -->
  <script src="../js/navbar-active.js"></script>
</head>
<body>


<div id="header-placeholder"></div>

<main class="main-content">
  <div class="container-fluid pt-5 pb-2">
    <div class="replays-hero anim-up">
      <div class="replays-hero-tag"><i class="bi bi-collection-play me-1"></i>À LA DEMANDE</div>
      <div class="replays-hero-title">Émissions BF1</div>
      <div class="replays-hero-sub">Retrouvez toutes vos émissions préférées, quand vous voulez, où vous voulez</div>
      <div class="replays-hero-stats">
        <div class="replays-stat-box"><div class="replays-stat-num" id="totalEmissions">--</div><div class="replays-stat-lbl">Émissions</div></div>
        <div class="replays-stat-box"><div class="replays-stat-num">--</div><div class="replays-stat-lbl">Catégories</div></div>
        <div class="replays-stat-box"><div class="replays-stat-num">24/7</div><div class="replays-stat-lbl">Disponible</div></div>
      </div>
    </div>
  </div>
  
  <div class="container-fluid py-3">
    <div class="search-bar-full">
      <div class="search-bar-input-wrap">
        <i class="bi bi-search"></i>
        <input type="text" class="search-bar-input" placeholder="Rechercher une émission..."/>
      </div>
      <select class="search-bar-select">
        <option value="all">Toutes les chaînes</option>
        <option value="BF1 National">BF1 National</option>
        <option value="BF1 Sport">BF1 Sport</option>
        <option value="BF1 Culture">BF1 Culture</option>
        <option value="BF1 Info">BF1 Info</option>
        <option value="BF1 Divertissement">BF1 Divertissement</option>
        <option value="BF1 Reportage">BF1 Reportage</option>
      </select>
      <button class="btn-red"><i class="bi bi-funnel-fill"></i>Filtrer</button>
    </div>
  </div>
  
  <div class="container-fluid">
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="trending"><i class="bi bi-fire"></i>Tendances</button>
      <button class="filter-pill" data-filter="recent"><i class="bi bi-clock"></i>Récents</button>
      <button class="filter-pill" data-filter="popular"><i class="bi bi-star"></i>Populaires</button>
    </div>

    <div class="section-head mb-3">
      <h3 class="section-title"><i class="bi bi-play-circle-fill"></i>Continuer à regarder</h3>
    </div>
    <div class="continue-cards mb-5">
      <!-- Chargé dynamiquement -->
    </div>

    <div class="section-head mb-3">
      <h3 class="section-title"><i class="bi bi-grid-3x3-gap-fill"></i>Catégories populaires</h3>
    </div>
    <div class="videos-grid mb-5" style="grid-template-columns:repeat(4,1fr)">
      <!-- Chargé dynamiquement -->
    </div>

    <div class="section-head mb-3">
      <h3 class="section-title"><i class="bi bi-clock-history"></i>Toutes les émissions</h3>
    </div>
    <div class="videos-grid">
      <!-- Chargé dynamiquement -->
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  // Injection header/footer
  const [headerHtml, footerHtml] = await Promise.all([
    fetch('../partials/header.html').then(r => r.text()),
    fetch('../partials/footer.html').then(r => r.text())
  ]);
  document.getElementById('header-placeholder').innerHTML = headerHtml;
  document.getElementById('footer-placeholder').innerHTML = footerHtml;

  // Mettre le lien actif sur "emissions.html"
  setTimeout(() => {
    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.getAttribute('href') === 'emissions.html') {
        link.classList.add('active');
      }
    });
  }, 100);

  // ===== INITIALISATION DU MENU MOBILE =====
  const initMobileMenu = () => {
    const hamburger = document.querySelector('.navbar-hamburger');
    const navLinks = document.querySelector('.navbar-links');
    if (hamburger && navLinks) {
      // Supprimer les anciens événements en clonant
      const newHamburger = hamburger.cloneNode(true);
      hamburger.parentNode.replaceChild(newHamburger, hamburger);
      const newNavLinks = navLinks.cloneNode(true);
      navLinks.parentNode.replaceChild(newNavLinks, navLinks);
      const finalHamburger = document.querySelector('.navbar-hamburger');
      const finalNavLinks = document.querySelector('.navbar-links');
      finalHamburger.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.toggle('open');
        finalNavLinks.classList.toggle('open');
        if (finalNavLinks.classList.contains('open')) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
      });
      finalNavLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
      document.addEventListener('click', (e) => {
        if (!finalHamburger.contains(e.target) && !finalNavLinks.contains(e.target)) {
          finalHamburger.classList.remove('open');
          finalNavLinks.classList.remove('open');
          document.body.style.overflow = '';
        }
      });
    } else {
      setTimeout(initMobileMenu, 100);
    }
  };
  setTimeout(initMobileMenu, 100);

  // Charger le JS spécifique à la page
  import('../js/emissions.js');
</script>
  <script type="module" src="../js/notifications.js"></script>
  <script type="module" src="../js/ticker.js"></script>
  <script type="module" src="../js/theme.js"></script>
</body>
</html>
