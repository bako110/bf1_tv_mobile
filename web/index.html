<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script>!function(){var t=localStorage.getItem('bf1_theme')||'dark';document.documentElement.setAttribute('data-theme',t)}();</script>
  <meta http-equiv="refresh" content="2; url=/pages/accueil.html"/>
  <title>BF1 TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .logo {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      box-shadow: 0 8px 32px rgba(26,115,232,0.4);
    }
    h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 1px; }
    p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">B1</div>
  <h1>BF1 TV</h1>
  <p>Chargement en cours...</p>
  <div class="spinner"></div>
  <script>setTimeout(function(){ window.location.href = '/pages/accueil.html'; }, 2000);</script>
</body>
</html>
