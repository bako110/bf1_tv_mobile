<!-- TICKER AU DESSUS DU HEADER -->
<div class="news-ticker" id="news-ticker">
  <span class="ticker-label"><i class="bi bi-lightning-fill me-1"></i>Programme du jour <span class="ticker-date"></span></span>
  <div class="ticker-track">
    <div class="ticker-track-inner"></div>
    <div class="ticker-track-inner duplicate"></div>
  </div>
</div>

<aside class="notif-panel" style="top:calc(var(--nav-h,48px) + 36px);height:calc(100vh - var(--nav-h,68px) - 46px);">
  <div class="notif-panel-header">
    <span class="notif-panel-title">
      <i class="bi bi-bell-fill" style="color:var(--red)"></i>
      Notifications
    </span>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="notif-panel-actions" id="notif-panel-actions" style="display:none;">
        <button class="notif-panel-action-btn" onclick="window._notifMarkAllRead()">Tout lire</button>
        <button class="notif-panel-action-btn" onclick="window._notifDeleteAll()">Effacer</button>
      </div>
      <button class="notif-panel-close"><i class="bi bi-x-lg"></i></button>
    </div>
  </div>
  <div class="notif-panel-body" id="notif-panel-body"></div>
</aside>
