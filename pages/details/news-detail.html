<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualité - BF1</title>
</head>
<body style="background:#000;min-height:100vh;color:#fff;">

  <!-- Header sticky -->
  <div class="sticky-top" style="background:#000;border-bottom:1px solid #1e1e1e;z-index:10;">
    <div class="d-flex align-items-center gap-2 px-3 py-3">
      <button onclick="history.back()"
              style="background:none;border:none;color:#fff;padding:0;line-height:1;cursor:pointer;">
        <i class="bi bi-arrow-left" style="font-size:22px;"></i>
      </button>
      <h1 class="mb-0 fw-bold flex-grow-1" style="font-size:18px;color:#fff;
          overflow:hidden;white-space:nowrap;text-overflow:ellipsis;" id="nd-header-title">Flash Info</h1>
      <div class="d-flex align-items-center gap-1">
        <span style="width:7px;height:7px;border-radius:50%;background:#E23E3E;display:inline-block;
               animation:ndPulse 1.4s ease-in-out infinite;"></span>
        <span style="font-size:11px;color:#E23E3E;font-weight:700;">FLASH INFO</span>
      </div>
    </div>
  </div>

  <style>
    @keyframes ndPulse {
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:0.3;transform:scale(1.4)}
    }
  </style>

  <!-- Contenu principal -->
  <div id="nd-container" style="padding-bottom:90px;">
    <div class="d-flex justify-content-center align-items-center" style="height:300px;">
      <div class="spinner-border text-danger" role="status"></div>
    </div>
  </div>

</body>
</html>
