<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct - BF1</title>
</head>
<body style="background:#000;color:#fff;margin:0;overflow:hidden;">

<style>
  @keyframes livePulse {
    0%, 100% { opacity:1; transform:scale(1); }
    50%       { opacity:0.3; transform:scale(1.4); }
  }
  @keyframes liveSpin { to { transform:rotate(360deg); } }

  /* Layout principal de la page live */
  #live-page {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #000;
  }

  /* Zone vidéo : taille fixe, ne scrolle pas */
  #live-video-container {
    flex-shrink: 0;
    background: #000;
  }

  /* Sections : prend tout l'espace restant + scroll indépendant */
  #live-sections {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    background: #0d0d0d;
    border-radius: 16px 16px 0 0;
    position: relative;
    z-index: 1;
    margin-top: -1px;
  }
  #live-sections::-webkit-scrollbar { display: none; }

  /* ===== PLEIN ÉCRAN PAYSAGE ===== */
  #live-video-container.live-fullscreen {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    width: 100dvh !important;
    height: 100vw !important;
    transform: rotate(90deg) !important;
    transform-origin: top left !important;
    margin-top: 100vw !important;
    z-index: 9998 !important;
    background: #000 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }
  #live-video-container.live-fullscreen #live-player-wrapper { width:100%; height:100%; }
  #live-video-container.live-fullscreen .live-ratio::before { display:none; }
  #live-video-container.live-fullscreen .live-ratio { height:100% !important; padding-top:0 !important; }
  #live-video-container.live-fullscreen video { object-fit:contain !important; width:100% !important; height:100% !important; }
  :fullscreen #live-player-wrapper, :-webkit-full-screen #live-player-wrapper {
    background:#000; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh;
  }
  :fullscreen video, :-webkit-full-screen video { object-fit:contain; width:100%; height:100%; }
  #live-fs-btn { transition:opacity .2s; }
  #live-fs-btn:active { opacity:.6; }
</style>

<!-- Wrapper principal flex colonne -->
<div id="live-page">

  <!-- Barre de statut LIVE (au-dessus de la vidéo) -->
  <div style="display:flex;align-items:center;justify-content:space-between;
              padding:10px 14px;border-bottom:1px solid #1a1a1a;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="width:8px;height:8px;border-radius:50%;background:#E23E3E;
             animation:livePulse 1.4s ease-in-out infinite;display:inline-block;"></span>
      <span style="font-size:13px;color:#E23E3E;font-weight:700;letter-spacing:.5px;">EN DIRECT</span>
    </div>
    <span id="live-viewers-header" style="display:none;align-items:center;gap:4px;
          font-size:12px;color:rgba(255,255,255,0.55);">
      <i class="bi bi-eye"></i>
      <span id="live-viewers-count">0</span> spectateurs
    </span>
  </div>

  <!-- Lecteur vidéo (taille fixe) -->
  <div id="live-video-container">
    <div style="display:flex;justify-content:center;align-items:center;
                aspect-ratio:16/9;background:#0a0a0a;">
      <div style="width:36px;height:36px;border:3px solid #1a1a1a;
                  border-top-color:#E23E3E;border-radius:50%;
                  animation:liveSpin 0.75s linear infinite;"></div>
    </div>
  </div>

  <!-- Sections de contenu (scrollables) -->
  <div id="live-sections">
    <!-- Drag handle -->
    <div style="display:flex;justify-content:center;padding:10px 0 6px;">
      <div style="width:36px;height:4px;background:#2a2a2a;border-radius:2px;"></div>
    </div>
    <div style="display:flex;justify-content:center;padding:20px 0 28px;">
      <div style="width:26px;height:26px;border:2px solid #1a1a1a;
                  border-top-color:#444;border-radius:50%;
                  animation:liveSpin 0.75s linear infinite;"></div>
    </div>
  </div>

</div>

</body>
</html>
