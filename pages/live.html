<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct - BF1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body style="background:#000;min-height:100vh;color:#fff;">

  <!-- Sticky header -->
  <div class="sticky-top" style="background:#000;border-bottom:1px solid #1e1e1e;z-index:10;">
    <div class="d-flex align-items-center justify-content-between px-3 py-3">
      <h1 class="mb-0 fw-bold" style="font-size:20px;color:#fff;">En Direct</h1>
      <div class="d-flex align-items-center gap-2">
        <span style="width:8px;height:8px;border-radius:50%;background:#E23E3E;display:inline-block;
               animation:livePulse 1.4s ease-in-out infinite;"></span>
        <span style="font-size:12px;color:#E23E3E;font-weight:700;letter-spacing:.5px;">LIVE</span>
        <span id="live-viewers-header" style="font-size:12px;color:rgba(255,255,255,0.6);display:none;">
          <i class="bi bi-eye"></i> <span id="live-viewers-count">0</span>
        </span>
      </div>
    </div>
  </div>

  <style>
    @keyframes livePulse {
      0%, 100% { opacity:1; transform:scale(1); }
      50% { opacity:0.3; transform:scale(1.4); }
    }

    /* ===== PLEIN ÉCRAN PAYSAGE ===== */
    /* Fallback CSS quand l'API Fullscreen native n'est pas dispo */
    #live-video-container.live-fullscreen {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100dvh !important;
      height: 100vw !important;
      transform: rotate(90deg) !important;
      transform-origin: top left !important;
      margin-top: 100vw !important;
      z-index: 9998 !important;
      background: #000 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    #live-video-container.live-fullscreen #live-player-wrapper {
      width: 100%; height: 100%;
    }
    #live-video-container.live-fullscreen .ratio::before { display: none; }
    #live-video-container.live-fullscreen .ratio {
      height: 100% !important; padding-top: 0 !important;
    }
    #live-video-container.live-fullscreen video {
      object-fit: contain !important;
      width: 100% !important; height: 100% !important;
    }
    /* Quand le navigateur gère lui-même le fullscreen natif */
    :fullscreen #live-player-wrapper,
    :-webkit-full-screen #live-player-wrapper {
      background: #000;
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
    }
    :fullscreen video,
    :-webkit-full-screen video {
      object-fit: contain;
      width: 100%; height: 100%;
    }
    #live-fs-btn { transition: opacity 0.2s; }
    #live-fs-btn:active { opacity: 0.6; }
  </style>

  <!-- Lecteur vidéo live -->
  <div id="live-video-container" style="margin-bottom:8px;">
    <div class="d-flex justify-content-center align-items-center" style="height:200px;background:#111;">
      <div class="spinner-border text-danger" role="status"></div>
    </div>
  </div>

  <!-- Sections de contenu -->
  <div id="live-sections" style="padding-bottom:80px;">
    <div class="d-flex justify-content-center align-items-center py-4">
      <div class="spinner-border text-secondary" style="width:1.5rem;height:1.5rem;" role="status"></div>
    </div>
  </div>

</body>
</html>
