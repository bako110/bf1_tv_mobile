<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - BF1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body style="background:#000;min-height:100vh;color:#fff;">

  <div class="d-flex flex-column align-items-center justify-content-center px-3" style="min-height:100vh;">
    
    <!-- Logo -->
    <div class="mb-4 text-center">
      <img src="./assets/images/logo.png" alt="BF1 TV" style="width:100px;height:100px;object-fit:contain;">
    </div>

    <!-- Formulaire -->
    <div class="w-100" style="max-width:360px;">
      <h2 class="fw-bold mb-4 text-center" style="font-size:24px;">Inscription</h2>

      <div id="register-message"></div>

      <form id="register-form" class="mb-3">
        <div class="mb-3">
          <label class="form-label" style="font-size:14px;color:#A0A0A0;">Nom d'utilisateur</label>
          <input type="text" name="username" class="form-control bg-dark text-light border-secondary" 
                 style="padding:12px;font-size:14px;" required>
        </div>
        <div class="mb-3">
          <label class="form-label" style="font-size:14px;color:#A0A0A0;">Email</label>
          <input type="email" name="email" class="form-control bg-dark text-light border-secondary" 
                 style="padding:12px;font-size:14px;" required>
        </div>
        <div class="mb-3">
          <label class="form-label" style="font-size:14px;color:#A0A0A0;">Mot de passe (min. 6 caractères)</label>
          <input type="password" name="password" class="form-control bg-dark text-light border-secondary" 
                 style="padding:12px;font-size:14px;" required>
        </div>
        <button type="submit" class="btn w-100 fw-bold"
                style="background:#E23E3E;color:#fff;border:none;padding:12px;font-size:15px;border-radius:8px;">
          <i class="bi bi-person-plus me-2"></i>S'inscrire
        </button>
      </form>

      <div class="text-center">
        <p style="color:#A0A0A0;font-size:14px;margin-bottom:12px;">
          Déjà inscrit ? <a href="#/login" style="color:#E23E3E;text-decoration:none;font-weight:600;">Se connecter</a>
        </p>
        <a href="#/home" style="color:#666;font-size:13px;text-decoration:none;">Continuer en tant qu'invité</a>
      </div>
    </div>
  </div>

</body>
</html>
