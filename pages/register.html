<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - BF1</title>
</head>
<body style="background:#000;min-height:100vh;color:#fff;">

  <!-- Header page avec bouton retour -->
  <div style="display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid #1a1a1a;">
    <button onclick="history.back()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;">
      <i class="bi bi-arrow-left"></i>
    </button>
    <span style="font-size:16px;font-weight:600;">Créer un compte</span>
  </div>

  <!-- Corps -->
  <div style="padding:28px 24px;max-width:420px;margin:0 auto;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:28px;">
      <img src="./assets/images/logo.png" alt="BF1 TV"
           style="width:72px;height:72px;object-fit:contain;
                  filter:drop-shadow(0 0 12px rgba(226,62,62,0.4));">
    </div>

    <div id="register-message" style="margin-bottom:16px;"></div>

    <form id="register-form">

      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:8px;">Nom d’utilisateur</label>
        <input type="text" name="username"
               style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px;
                      padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;
                      -webkit-appearance:none;"
               onfocus="this.style.borderColor='#E23E3E'" onblur="this.style.borderColor='#2a2a2a'"
               required>
      </div>

      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:8px;">Email</label>
        <input type="email" name="email"
               style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px;
                      padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;
                      -webkit-appearance:none;"
               onfocus="this.style.borderColor='#E23E3E'" onblur="this.style.borderColor='#2a2a2a'"
               required>
      </div>

      <div style="margin-bottom:24px;">
        <label style="display:block;font-size:13px;color:#888;margin-bottom:8px;">Mot de passe <span style="color:#555;">(min. 6 caractères)</span></label>
        <input type="password" name="password"
               style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px;
                      padding:14px 16px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;
                      -webkit-appearance:none;"
               onfocus="this.style.borderColor='#E23E3E'" onblur="this.style.borderColor='#2a2a2a'"
               required minlength="6">
      </div>

      <button type="submit"
              style="width:100%;background:#E23E3E;border:none;border-radius:12px;
                     padding:15px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;
                     display:flex;align-items:center;justify-content:center;gap:8px;">
        <i class="bi bi-person-plus"></i> S’inscrire
      </button>
    </form>

    <div style="text-align:center;margin-top:24px;">
      <p style="color:#666;font-size:14px;margin:0;">
        Déjà inscrit ?
        <a href="#/login" style="color:#E23E3E;text-decoration:none;font-weight:600;">Se connecter</a>
      </p>
    </div>
  </div>

</body>
</html>
